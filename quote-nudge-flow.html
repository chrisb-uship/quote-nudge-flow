document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

over: var(--blue-800);\n  --tabs-contained-bg-select: var(--blue-800);\n  --tabs-contained-border-active: var(--blue-500);\n  --tabs-contained-border: var(--gray-600);\n  --tabs-contained-border-hover: var(--blue-400);\n  --tabs-underline-active: var(--blue-500);\n  --tabs-underline: var(--gray-600);\n  --tabs-underline-disabled: var(--gray-700);\n  --tabs-underline-hover: var(--blue-400);\n  --text-button: var(--gray-950);\n  --text-button-destructive: var(--red-400);\n  --text-button-ghost: var(--blue-500);\n  --text-button-ghost-hover: var(--blue-400);\n  --text-button-ghost-pressed: var(--blue-500);\n  --text-button-tertiary: var(--blue-500);\n  --text-disabled: var(--gray-500);\n  --text-disabled-on-card: var(--gray-500);\n  --text-error: var(--red-600);\n  --text-helper: var(--gray-200);\n  --text-inverse: var(--gray-950);\n  --text-label: var(--gray-0);\n  --text-loading: var(--brand-uShip);\n  --text-placeholder: var(--gray-200);\n  --text-primary: var(--gray-0);\n  --text-secondary: var(--gray-200);\n  --text-tab-contained: var(--blue-200);\n  --text-tertiary: var(--gray-300);\n  --shadow-focus-glow: var(--brand-navy-900-35);\n}\n\n\n/* ---------- LATO (self-hosted brand fonts) ----------\n   Lato is Skid's only runtime typeface. No monospace / Roboto Mono.\n   Numerics use Lato with tabular-nums (see .skid-num-* classes). */\n\n@font-face { font-family: \"Lato\"; font-style: normal; font-weight: 100;\n  src: url(\"1cde9f9a-4772-489f-8721-061e3a75648d\") format(\"truetype\"); font-display: swap; }\n@font-face { font-family: \"Lato\"; font-style: italic; font-weight: 100;\n  src: url(\"a4228592-0e8b-4d28-b88e-a93ea3d6856f\") format(\"truetype\"); font-display: swap; }\n@font-face { font-family: \"Lato\"; font-style: normal; font-weight: 300;\n  src: url(\"ada0b9ba-51d9-441e-a34c-528beba4b693\") format(\"truetype\"); font-display: swap; }\n@font-face { font-family: \"Lato\"; font-style: italic; font-weight: 300;\n  src: url(\"28947b8f-7815-4330-840a-66fe8b88e776\") format(\"truetype\"); font-display: swap; }\n@font-face { font-family: \"Lato\"; font-style: normal; font-weight: 400;\n  src: url(\"23f852be-83f0-4987-bacd-1fed5cdf9c77\") format(\"truetype\"); font-display: swap; }\n@font-face { font-family: \"Lato\"; font-style: italic; font-weight: 400;\n  src: url(\"ddfc889d-f582-41f1-aa6d-a8d3d058237a\") format(\"truetype\"); font-display: swap; }\n/* Lato has no native 600 file; map Semibold → Bold so helper/semibold (600)\n   resolves to a real face instead of a synthesized one. */\n@font-face { font-family: \"Lato\"; font-style: normal; font-weight: 600;\n  src: url(\"d7eff066-f6a0-4747-880a-1f0b0d95d4e8\") format(\"truetype\"); font-display: swap; }\n@font-face { font-family: \"Lato\"; font-style: normal; font-weight: 700;\n  src: url(\"d7eff066-f6a0-4747-880a-1f0b0d95d4e8\") format(\"truetype\"); font-display: swap; }\n@font-face { font-family: \"Lato\"; font-style: italic; font-weight: 700;\n  src: url(\"b0c44f85-c206-4c64-99ec-e876a94f271f\") format(\"truetype\"); font-display: swap; }\n@font-face { font-family: \"Lato\"; font-style: normal; font-weight: 900;\n  src: url(\"e527dcea-1c8b-46cb-95d5-6e5017f49590\") format(\"truetype\"); font-display: swap; }\n@font-face { font-family: \"Lato\"; font-style: italic; font-weight: 900;\n  src: url(\"a5f7aed6-250f-48b3-9ee7-e9270b5beeeb\") format(\"truetype\"); font-display: swap; }\n\n\n/* ============================================================\n   COMPAT SHIMS — legacy semantic names → tokens.css equivalents\n   These exist so files written before the Figma-aligned token\n   refactor keep rendering. New work should use tokens.css names.\n   ============================================================ */\n\n:root {\n  /* legacy text */\n  --text-on-fill:        var(--text-inverse);\n  --text-link:           var(--link-surface-01);\n\n  /* legacy borders */\n  --border-focus:        var(--border-focus-ring);\n\n  /* legacy interactive (blue) → new --action-secondary-* */\n  --interactive-default: var(--action-secondary);\n  --interactive-hover:   var(--action-secondary-hover);\n  --interactive-pressed: var(--action-secondary-pressed);\n  --interactive-disabled:var(--gray-400);\n\n  /* legacy feedback → new --status-*-text */\n  --feedback-success:    var(--status-success-text);\n  --feedback-warning:    var(--status-warning-text);\n  --feedback-error:      var(--status-error-text);\n  --feedback-info:       var(--status-info-text);\n\n  /* legacy blue-950 used in some dark-bg panels — alias to blue-900 (spec) */\n  --blue-950: var(--blue-900);\n}\n\n/* ============================================================\n   ELEMENT DEFAULTS + TYPE SCALE CLASSES\n   ============================================================ */\n\nbody, .skid-body {\n  font-family: var(--font-sans);\n  font-size: var(--body-md-size);\n  line-height: var(--body-md-line);\n  color: var(--text-primary);\n  /* Page background is ALWAYS layer-01. layer-02 = components,\n     layer-03 = high-emphasis call-outs. Never flip these. */\n  background: var(--surface-layer-01);\n}\n\nh1, .skid-h1 { font: var(--h1-weight) var(--h1-size)/var(--h1-line) var(--font-sans); margin: 0; color: var(--text-primary); }\nh2, .skid-h2 { font: var(--h2-weight) var(--h2-size)/var(--h2-line) var(--font-sans); margin: 0; color: var(--text-primary); }\nh3, .skid-h3 { font: var(--h3-weight) var(--h3-size)/var(--h3-line) var(--font-sans); margin: 0; color: var(--text-primary); }\nh4, .skid-h4 { font: var(--h4-weight) var(--h4-size)/var(--h4-line) var(--font-sans); margin: 0; color: var(--text-primary); }\nh5, .skid-h5 { font: var(--h5-weight) var(--h5-size)/var(--h5-line) var(--font-sans); margin: 0; color: var(--text-primary); }\n\n.skid-body-md { font: var(--body-md-weight) var(--body-md-size)/var(--body-md-line) var(--font-sans); }\n.skid-body-sm { font: var(--body-sm-weight) var(--body-sm-size)/var(--body-sm-line) var(--font-sans); color: var(--text-secondary); }\n.skid-label   { font: var(--body-label-weight) var(--body-label-size)/var(--body-label-line) var(--font-sans); color: var(--text-label); }\n.skid-helper  { font: 400 var(--helper-size)/var(--helper-line) var(--font-sans); color: var(--text-helper); }\n.skid-helper-strong { font: 600 var(--helper-size)/var(--helper-line) var(--font-sans); color: var(--text-helper); }\n\n.skid-button-text { font: var(--button-weight) var(--button-size)/var(--button-line) var(--font-sans); }\n.skid-badge-sm { font: 700 var(--badge-sm-size)/var(--badge-sm-line) var(--font-sans); letter-spacing: var(--badge-sm-track); text-transform: uppercase; }\n.skid-badge-lg { font: 700 var(--badge-lg-size)/var(--badge-lg-line) var(--font-sans); letter-spacing: var(--badge-lg-track); }\n\n.skid-num-xs { font: var(--num-xs-weight) var(--num-xs-size)/var(--num-xs-line) var(--font-sans); letter-spacing: var(--num-xs-track); font-variant-numeric: tabular-nums; }\n.skid-num-sm { font: var(--num-sm-weight) var(--num-sm-size)/var(--num-sm-line) var(--font-sans); letter-spacing: var(--num-sm-track); font-variant-numeric: tabular-nums; }\n.skid-num-md { font: var(--num-md-weight) var(--num-md-size)/var(--num-md-line) var(--font-sans); letter-spacing: var(--num-md-track); font-variant-numeric: tabular-nums; }\n.skid-num-lg { font: var(--num-lg-weight) var(--num-lg-size)/var(--num-lg-line) var(--font-sans); letter-spacing: var(--num-lg-track); font-variant-numeric: tabular-nums; }\n\n/* .skid-mono is intentionally removed — Skid does not use a mono face.\n   Set numerics in Lato with tabular-nums via .skid-num-xs/sm/md/lg. */\n\n/* Links — standalone (no underline) + inline (underlined) */\na, .skid-link { color: var(--text-link); text-decoration: underline; text-underline-offset: 2px; }\na:hover, .skid-link:hover { color: var(--blue-800); }\n\n.skid-link-sm, .skid-link-md, .skid-link-lg { color: var(--text-link); text-decoration: none; }\n.skid-link-sm:hover, .skid-link-md:hover, .skid-link-lg:hover { color: var(--blue-800); text-decoration: underline; text-underline-offset: 2px; }\n.skid-link-sm { font: var(--link-sm-weight) var(--link-sm-size)/var(--link-sm-line) var(--font-sans); }\n.skid-link-md { font: var(--link-md-weight) var(--link-md-size)/var(--link-md-line) var(--font-sans); }\n.skid-link-lg { font: var(--link-lg-weight) var(--link-lg-size)/var(--link-lg-line) var(--font-sans); }\n\n.skid-link-sm-inline, .skid-link-md-inline, .skid-link-lg-inline { color: var(--text-link); text-decoration: underline; text-underline-offset: 2px; }\n.skid-link-sm-inline:hover, .skid-link-md-inline:hover, .skid-link-lg-inline:hover { color: var(--blue-800); }\n.skid-link-sm-inline { font: var(--link-sm-weight) var(--link-sm-size)/var(--link-sm-line) var(--font-sans); }\n.skid-link-md-inline { font: var(--link-md-weight) var(--link-md-size)/var(--link-md-line) var(--font-sans); }\n.skid-link-lg-inline { font: var(--link-lg-weight) var(--link-lg-size)/var(--link-lg-line) var(--font-sans); }\n\n\n/* ============================================================\n   DARK MODE — apply via <html data-theme=\"dark\">\n   Skid's dark mode (per Figma demo-dark frames) flips grayscale\n   primitives — surfaces darken to rgb(30,30,30) and rgb(43,48,56),\n   text inverts to near-white. Brand Blue, action Green, and\n   destructive Red stay roughly the same hue, with the 50/100/800/900\n   stops nudged so chips read on dark surfaces.\n   ============================================================ */\n\n[data-theme=\"dark\"] {\n  --gray-0:   rgb(30,30,30);\n  --gray-50:  rgb(20,20,22);\n  --gray-100: rgb(43,48,56);\n  --gray-150: rgb(53,53,53);\n  --gray-200: rgb(75,85,99);\n  --gray-300: rgb(107,114,128);\n  --gray-400: rgb(138,141,151);\n  --gray-500: rgb(156,163,175);\n  --gray-600: rgb(205,210,215);\n  --gray-700: rgb(229,231,235);\n  --gray-800: rgb(244,246,248);\n  --gray-900: rgb(249,250,251);\n  --gray-950: rgb(255,255,255);\n\n  --blue-50:   rgb(8,33,52);\n  --blue-100:  rgb(11,53,82);\n  --blue-200:  rgb(11,75,116);\n  --blue-800:  rgb(159,206,228);\n  --blue-900:  rgb(199,224,238);\n\n  --green-50:  rgb(6,30,15);\n  --green-100: rgb(10,53,25);\n  --green-800: rgb(86,166,116);\n  --green-900: rgb(132,189,153);\n\n  --red-50:    rgb(45,16,16);\n  --red-100:   rgb(70,22,22);\n  --red-800:   rgb(225,135,135);\n  --red-900:   rgb(241,178,178);\n\n  --orange-50: rgb(45,28,8);\n  --orange-100:rgb(70,42,12);\n  --orange-900:rgb(245,206,140);\n\n  --purple-50: rgb(33,22,52);\n  --purple-100:rgb(54,32,82);\n  --purple-900:rgb(195,178,217);\n\n  --text-primary:   var(--gray-800);\n  --text-secondary: var(--gray-700);\n  --text-tertiary:  var(--gray-500);\n  --text-disabled:  var(--gray-400);\n  --text-helper:    var(--gray-600);\n  --text-on-fill:   var(--gray-950);\n  --text-link:      rgb(116,184,213);\n\n  --surface-layer-01: var(--gray-0);\n  --surface-layer-02: var(--gray-50);\n  --surface-layer-03: var(--gray-100);\n  --surface-shell:    var(--gray-0);\n\n  --border-interactive: var(--gray-300);\n  --border-strong:      var(--gray-500);\n  --border-soft:        var(--gray-200);\n  --border-disabled:    var(--gray-300);\n  --border-focus:       rgb(90,191,224);\n\n  --icon-default: var(--gray-700);\n\n  --focus-ring: 0 0 0 2px var(--gray-0), 0 0 0 4px rgb(90,191,224);\n\n  --elev-1: 0 1px 2px rgba(0,0,0,0.40), 0 1px 1px rgba(0,0,0,0.30);\n  --elev-2: 0 2px 4px rgba(0,0,0,0.45), 0 1px 2px rgba(0,0,0,0.30);\n  --elev-3: 0 4px 12px rgba(0,0,0,0.50), 0 2px 4px rgba(0,0,0,0.30);\n  --elev-4: 0 8px 24px rgba(0,0,0,0.55), 0 4px 8px rgba(0,0,0,0.30);\n  --elev-overlay: 0 16px 40px rgba(0,0,0,0.65), 0 4px 12px rgba(0,0,0,0.40);\n}\n\n[data-theme=\"dark\"] body, [data-theme=\"dark\"] .skid-body {\n  background: var(--gray-50);\n  color: var(--text-primary);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Skid · Components — buttons, inputs, badges, alerts, cards,\n   chips, tabs, modal, etc. Imports tokens from colors_and_type.css.\n   ============================================================ */\n\n/* ---------- BUTTONS ---------- */\n\n.skid-btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 8px;\n  height: 48px;\n  padding: 0 20px;\n  border-radius: 4px;\n  border: 1px solid transparent;\n  background: transparent;\n  font: 700 16px/24px var(--font-sans);\n  color: var(--gray-0);\n  cursor: pointer;\n  transition: background-color 120ms cubic-bezier(0.2,0,0,1), border-color 120ms, color 120ms;\n  white-space: nowrap;\n  user-select: none;\n}\n.skid-btn:focus-visible { outline: none; box-shadow: var(--focus-ring); }\n.skid-btn[disabled], .skid-btn[aria-disabled=\"true\"] {\n  background: var(--gray-300) !important;\n  border-color: var(--gray-300) !important;\n  color: var(--gray-500) !important;\n  cursor: not-allowed;\n}\n\n/* sizes */\n.skid-btn--sm { height: 32px; padding: 0 12px; font-size: 14px; line-height: 20px; }\n.skid-btn--md { height: 40px; padding: 0 16px; }\n.skid-btn--lg { height: 48px; padding: 0 20px; }\n\n/* primary — green CTA */\n.skid-btn--primary { background: var(--action-primary); }\n.skid-btn--primary:hover { background: var(--action-primary-hover); }\n.skid-btn--primary:active { background: var(--action-primary-pressed); }\n\n/* secondary — blue */\n.skid-btn--secondary { background: var(--interactive-default); }\n.skid-btn--secondary:hover { background: var(--interactive-hover); }\n.skid-btn--secondary:active { background: var(--interactive-pressed); }\n\n/* tertiary — outlined; fills with blue on hover/press.\n   Source of truth: Figma \"Button\" component (style2=Tertiary).\n   Default: transparent bg, 2px blue-700 border, blue-700 text/icon.\n   Hover:   blue-700 fill, white text/icon (button \"fills in\").\n   Pressed: blue-600 fill, white text/icon.\n   Border is 2px (not 1px) per Figma spec. */\n.skid-btn--tertiary {\n  background: transparent;\n  border-width: 2px;\n  border-color: var(--border-button-tertiary);\n  color: var(--text-button-tertiary);\n}\n.skid-btn--tertiary:hover {\n  background: var(--action-tertiary-hover);\n  border-color: var(--action-tertiary-hover);\n  color: var(--text-button);\n}\n.skid-btn--tertiary:active {\n  background: var(--action-tertiary-pressed);\n  border-color: var(--action-tertiary-pressed);\n  color: var(--text-button);\n}\n\n/* ghost — no border */\n.skid-btn--ghost { background: transparent; color: var(--blue-600); }\n.skid-btn--ghost:hover { background: var(--gray-50); color: var(--blue-700); }\n.skid-btn--ghost:active { background: var(--gray-100); }\n\n/* destructive */\n.skid-btn--destructive { background: var(--action-destructive); }\n.skid-btn--destructive:hover { background: var(--action-destructive-hover); }\n.skid-btn--destructive:active { background: var(--action-destructive-pressed); }\n\n/* icon-only square */\n.skid-btn--icon { width: 40px; padding: 0; aspect-ratio: 1/1; }\n\n/* ---------- SPLIT BUTTON ----------\n   Source of truth: Figma \"Split Button\" (node 2229:832).\n   A leading action segment (rounded left) + a 2px gap + a trailing\n   chevron/icon segment (rounded right), both sharing the variant color.\n   Compose with any .skid-btn variant on each segment. The 2px gap shows\n   the page background between segments per Figma spec. */\n.skid-split-btn {\n  display: inline-flex;\n  gap: 2px;\n}\n/* leading segment: square off the right corners */\n.skid-split-btn > .skid-btn:first-child {\n  border-top-right-radius: 0;\n  border-bottom-right-radius: 0;\n}\n/* trailing segment: icon-only square, square off the left corners */\n.skid-split-btn > .skid-btn:last-child {\n  border-top-left-radius: 0;\n  border-bottom-left-radius: 0;\n  width: 48px;            /* large default — matches .skid-btn--lg height */\n  padding: 0;\n  aspect-ratio: 1 / 1;\n}\n.skid-split-btn > .skid-btn:last-child svg,\n.skid-split-btn > .skid-btn:last-child [data-lucide] {\n  width: 24px;\n  height: 24px;\n}\n/* size variants mirror the button scale (height drives the square width) */\n.skid-split-btn--md > .skid-btn { height: 40px; }\n.skid-split-btn--md > .skid-btn:first-child { padding: 0 16px; }\n.skid-split-btn--md > .skid-btn:last-child { width: 40px; }\n.skid-split-btn--sm > .skid-btn { height: 32px; font-size: 14px; line-height: 20px; }\n.skid-split-btn--sm > .skid-btn:first-child { padding: 0 12px; }\n.skid-split-btn--sm > .skid-btn:last-child { width: 32px; }\n.skid-split-btn--sm > .skid-btn:last-child svg,\n.skid-split-btn--sm > .skid-btn:last-child [data-lucide] { width: 20px; height: 20px; }\n\n/* ---------- INPUTS ---------- */\n\n.skid-field { display: flex; flex-direction: column; gap: 4px; }\n.skid-field__label {\n  font: 700 12px/16px var(--font-sans);\n  color: var(--gray-800);\n}\n.skid-field__helper {\n  font: 400 12px/16px var(--font-sans);\n  color: var(--gray-700);\n}\n.skid-field--error .skid-field__helper { color: var(--feedback-error); }\n\n.skid-input {\n  height: 48px;\n  padding: 0 14px;\n  border: 1px solid var(--border-interactive);\n  border-radius: 4px;\n  background: var(--surface-field);\n  font: 400 16px/22px var(--font-sans);\n  color: var(--text-primary);\n  transition: border-color 120ms, box-shadow 120ms;\n  width: 100%;\n  box-sizing: border-box;\n}\n.skid-input::placeholder { color: var(--gray-500); }\n.skid-input:hover { border-color: var(--gray-500); }\n.skid-input:focus { outline: none; border-color: var(--blue-500); box-shadow: 0 0 0 3px rgba(0,131,187,0.15); }\n.skid-input[disabled] { background: var(--gray-100); color: var(--gray-500); cursor: not-allowed; }\n.skid-field--error .skid-input { border-color: var(--feedback-error); }\n.skid-field--error .skid-input:focus { box-shadow: 0 0 0 3px rgba(212,68,68,0.18); }\n\n.skid-textarea { min-height: 96px; padding: 12px 14px; line-height: 22px; resize: vertical; }\n\n/* select chevron baked in */\n.skid-select {\n  appearance: none; -webkit-appearance: none;\n  background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%234B5563' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/><\u002Fsvg>\");\n  background-repeat: no-repeat;\n  background-position: right 14px center;\n  padding-right: 40px;\n}\n\n/* ---------- CHECKBOX & RADIO ---------- */\n\n.skid-check {\n  display: inline-flex; align-items: center; gap: 10px;\n  font: 400 14px/19px var(--font-sans); color: var(--gray-800);\n  cursor: pointer; user-select: none;\n}\n.skid-check input { position: absolute; opacity: 0; pointer-events: none; }\n.skid-check__box {\n  width: 18px; height: 18px; border-radius: 3px;\n  border: 1px solid var(--gray-500); background: var(--gray-0);\n  display: inline-grid; place-items: center; flex-shrink: 0;\n  transition: background 120ms, border-color 120ms;\n}\n.skid-check input:checked + .skid-check__box {\n  background: var(--blue-600); border-color: var(--blue-600);\n}\n.skid-check input:checked + .skid-check__box::after {\n  content: \"\"; width: 10px; height: 6px;\n  border-left: 2px solid var(--gray-0); border-bottom: 2px solid var(--gray-0);\n  transform: rotate(-45deg) translate(1px,-1px);\n}\n\n.skid-radio__box { border-radius: 50%; }\n.skid-radio input:checked + .skid-radio__box {\n  background: var(--gray-0); border-color: var(--blue-600); border-width: 5px;\n}\n.skid-radio input:checked + .skid-radio__box::after { content: none; }\n\n/* ---------- SWITCH ---------- */\n\n.skid-switch {\n  position: relative; display: inline-block; width: 40px; height: 24px; flex-shrink: 0;\n}\n.skid-switch input { opacity: 0; width: 0; height: 0; }\n.skid-switch__track {\n  position: absolute; inset: 0; background: var(--gray-300);\n  border-radius: 999px; transition: background 160ms;\n  cursor: pointer;\n}\n.skid-switch__track::after {\n  content: \"\"; position: absolute; top: 2px; left: 2px;\n  width: 20px; height: 20px; border-radius: 50%;\n  background: var(--gray-0); box-shadow: 0 1px 2px rgba(0,0,0,0.2);\n  transition: transform 160ms;\n}\n.skid-switch input:checked + .skid-switch__track { background: var(--blue-600); }\n.skid-switch input:checked + .skid-switch__track::after { transform: translateX(16px); }\n\n/* ---------- BADGE ---------- */\n/* Skid badges per Figma: 2px radius, 5 colors (Blue/Green/Red/Orange/Purple)\n   × 2 types (Solid / Outline) × 2 sizes (lg=12px / sm=10px).\n   Outline = color-50 bg + 1px color-600 border + gray-800 text.\n   Solid   = color-600 bg + white text. */\n\n.skid-badge {\n  display: inline-flex; align-items: center; gap: 4px;\n  height: 26px; padding: 4px 8px;\n  border-radius: 2px;\n  font-family: var(--font-sans);\n  font: 700 12px/18px var(--font-sans);\n  letter-spacing: 0.5px;\n  text-transform: uppercase;\n  /* default = Blue Outline */\n  background: var(--blue-50);\n  border: 1px solid var(--blue-600);\n  color: var(--gray-800);\n  box-sizing: border-box;\n}\n.skid-badge--sm { height: 18px; padding: 0 8px; font-size: 10px; line-height: 18px; }\n.skid-badge--lg { height: 26px; padding: 4px 8px; font-size: 12px; line-height: 18px; }\n\n/* Type = Solid (filled) — white text */\n.skid-badge--solid { color: var(--gray-0); border: 0; padding: 4px 8px; }\n.skid-badge--solid.skid-badge--sm { padding: 0 8px; }\n\n/* Color modifiers — apply to both types */\n.skid-badge--blue    { background: var(--blue-50);    border-color: var(--blue-600); }\n.skid-badge--blue.skid-badge--solid    { background: var(--blue-600); }\n.skid-badge--green   { background: var(--green-50);   border-color: var(--green-800); }\n.skid-badge--green.skid-badge--solid   { background: var(--green-800); }\n.skid-badge--red     { background: var(--red-50);     border-color: var(--red-600); }\n.skid-badge--red.skid-badge--solid     { background: var(--red-600); }\n.skid-badge--orange  { background: var(--orange-50);  border-color: var(--orange-600); }\n.skid-badge--orange.skid-badge--solid  { background: var(--orange-600); }\n.skid-badge--purple  { background: var(--purple-50);  border-color: var(--purple-600); }\n.skid-badge--purple.skid-badge--solid  { background: var(--purple-600); }\n.skid-badge--gray    { background: var(--gray-100);   border-color: var(--gray-400); }\n.skid-badge--gray.skid-badge--solid    { background: var(--gray-700); }\n\n/* Semantic aliases — preserve old API for any existing usage */\n.skid-badge--info    { background: var(--blue-50);    border: 1px solid var(--blue-600);   color: var(--gray-800); }\n.skid-badge--success { background: var(--green-50);   border: 1px solid var(--green-800);  color: var(--gray-800); }\n.skid-badge--warning { background: var(--orange-50);  border: 1px solid var(--orange-600); color: var(--gray-800); }\n.skid-badge--error   { background: var(--red-50);     border: 1px solid var(--red-600);    color: var(--gray-800); }\n.skid-badge--brand   { background: var(--blue-600);   border: 0; color: var(--gray-0); }\n\n/* ---------- TAG ---------- */\n/* Skid tags per Figma: pill (100px radius), default = white-ish bg + gray-300 border,\n   active = blue-50 bg + blue-600 border + blue-600 text.\n   Sizes: default (40px tall, 14px text), compact (24px tall, 12px bold text).\n   Optional leading + icon and trailing × icon. */\n\n.skid-tag {\n  display: inline-flex; align-items: center; gap: 8px;\n  height: 40px; padding: 8px 16px;\n  border-radius: 100px;\n  background: var(--gray-50);\n  border: 1px solid var(--gray-300);\n  font: 400 14px/19px var(--font-sans);\n  color: var(--gray-800);\n  cursor: pointer;\n  transition: background 120ms, border-color 120ms, color 120ms;\n  user-select: none;\n  white-space: nowrap;\n}\n.skid-tag:hover { border-color: var(--gray-500); }\n.skid-tag svg { width: 20px; height: 20px; flex-shrink: 0; color: currentColor; }\n\n/* Compact */\n.skid-tag--compact {\n  height: 24px; padding: 4px 12px;\n  gap: 4px;\n  font: 700 12px/16px var(--font-sans);\n}\n.skid-tag--compact svg { width: 16px; height: 16px; }\n\n/* Active */\n.skid-tag--active,\n.skid-tag[aria-pressed=\"true\"] {\n  background: var(--blue-50);\n  border-color: var(--blue-600);\n  color: var(--blue-600);\n}\n\n/* Disabled */\n.skid-tag[aria-disabled=\"true\"],\n.skid-tag[disabled] {\n  background: transparent; border-color: var(--gray-200); color: var(--gray-400);\n  cursor: not-allowed;\n}\n\n/* The X close affordance — clickable subregion */\n.skid-tag__close {\n  display: inline-flex; align-items: center; justify-content: center;\n  width: 20px; height: 20px; border: 0; background: transparent;\n  color: inherit; border-radius: 999px; cursor: pointer; flex-shrink: 0;\n}\n.skid-tag--compact .skid-tag__close { width: 16px; height: 16px; }\n.skid-tag__close:hover { background: rgba(2,124,177,0.12); }\n\n/* ---------- ALERT ---------- */\n\n.skid-alert {\n  display: flex; gap: 12px; padding: 14px 16px;\n  border-radius: 8px; border: 1px solid var(--border-soft);\n  background: var(--gray-50);\n}\n.skid-alert__icon { flex-shrink: 0; width: 20px; height: 20px; }\n.skid-alert__body { flex: 1; }\n.skid-alert__title { font: 700 14px/19px var(--font-sans); color: var(--gray-900); margin-bottom: 2px; }\n.skid-alert__text  { font: 400 14px/19px var(--font-sans); color: var(--gray-700); }\n.skid-alert--info { background: var(--blue-50); border-color: var(--blue-200); }\n.skid-alert--info .skid-alert__icon { color: var(--blue-600); }\n.skid-alert--success { background: var(--green-50); border-color: var(--green-200); }\n.skid-alert--success .skid-alert__icon { color: var(--green-700); }\n.skid-alert--warning { background: var(--orange-50); border-color: var(--orange-200); }\n.skid-alert--warning .skid-alert__icon { color: var(--orange-600); }\n.skid-alert--error { background: var(--red-50); border-color: var(--red-200); }\n.skid-alert--error .skid-alert__icon { color: var(--red-700); }\n\n/* ---------- CARD ---------- */\n\n.skid-card {\n  background: var(--gray-0);\n  border: 1px solid var(--gray-300);\n  border-radius: 8px;\n  overflow: hidden;\n}\n.skid-card__pad { padding: 16px; }\n.skid-card--shadow { box-shadow: var(--elev-1); }\n\n/* ---------- MODAL ----------\n   Figma spec: 400px wide, single layer (no divided head/body/foot strips),\n   24px padding all around, 8px radius, soft directional shadow.\n   Header = title icon + title + close X. Body = message + right-aligned\n   action buttons (Ghost cancel + Secondary/Primary/Destructive confirm). */\n\n.skid-modal-scrim {\n  position: fixed; inset: 0;\n  background: rgba(0,31,51,0.32);\n  display: grid; place-items: center;\n  padding: 24px; z-index: 1000;\n}\n.skid-modal {\n  width: 100%; max-width: 400px;\n  background: var(--gray-0);\n  border-radius: 8px;\n  box-shadow: 4px 8px 8px 0 rgba(43,43,43,0.12);\n  padding: 24px;\n  display: flex; flex-direction: column; gap: 16px;\n  font-family: var(--font-sans);\n  box-sizing: border-box;\n}\n.skid-modal__head {\n  display: flex; align-items: center; justify-content: space-between; gap: 12px;\n}\n.skid-modal__title {\n  display: flex; align-items: center; gap: 12px;\n  font: 700 20px/24px var(--font-sans); color: var(--gray-800);\n  margin: 0;\n}\n.skid-modal__title svg { width: 24px; height: 24px; flex-shrink: 0; }\n.skid-modal__title--info    svg { color: var(--blue-600); }\n.skid-modal__title--success svg { color: var(--green-800); }\n.skid-modal__title--warning svg { color: var(--orange-600); }\n.skid-modal__title--error   svg { color: var(--red-800); }\n.skid-modal__close {\n  width: 24px; height: 24px; border: 0; background: transparent;\n  display: grid; place-items: center;\n  color: var(--gray-700); cursor: pointer; border-radius: 4px;\n  flex-shrink: 0;\n}\n.skid-modal__close:hover { background: var(--gray-100); color: var(--gray-900); }\n.skid-modal__body {\n  font: 400 16px/22px var(--font-sans); color: var(--gray-700);\n  margin: 0;\n}\n.skid-modal__actions {\n  display: flex; justify-content: flex-end; gap: 12px;\n  margin-top: 16px;\n}\n\n/* ---------- AVATAR ---------- */\n\n.skid-avatar {\n  display: inline-grid; place-items: center;\n  width: 40px; height: 40px; border-radius: 50%;\n  background: var(--blue-100); color: var(--blue-800);\n  font: 700 14px/1 var(--font-sans);\n  text-transform: uppercase;\n  flex-shrink: 0;\n}\n.skid-avatar--sm { width: 28px; height: 28px; font-size: 11px; }\n.skid-avatar--lg { width: 56px; height: 56px; font-size: 18px; }\n\n/* ---------- DIVIDERS ---------- */\n\n.skid-divider { height: 1px; background: var(--gray-200); border: 0; margin: 0; }\n.skid-divider--strong { background: var(--gray-300); }\n.skid-divider--vertical { width: 1px; height: auto; min-height: 16px; }\n\n/* ============================================================\n   ACCORDION\n   ============================================================ */\n.skid-accordion {\n  border: 1px solid var(--gray-300);\n  border-radius: 8px;\n  background: var(--gray-0);\n  overflow: hidden;\n}\n.skid-accordion + .skid-accordion { margin-top: 8px; }\n.skid-accordion__trigger {\n  width: 100%; box-sizing: border-box;\n  height: 56px; padding: 0 16px;\n  background: var(--gray-0); border: 0;\n  display: flex; align-items: center; justify-content: space-between;\n  font: 700 18px/24px var(--font-sans); color: var(--gray-800);\n  cursor: pointer;\n  text-align: left;\n}\n.skid-accordion__trigger:hover { border-color: transparent; }\n.skid-accordion:hover { border-color: var(--gray-600); }\n.skid-accordion__trigger svg {\n  width: 24px; height: 24px; color: var(--gray-700);\n  transition: transform 180ms cubic-bezier(0.2,0,0,1);\n}\n.skid-accordion[open] .skid-accordion__trigger svg { transform: rotate(180deg); }\n.skid-accordion[open] .skid-accordion__trigger { color: var(--blue-700); border-bottom: 1px solid var(--gray-200); }\n.skid-accordion__body {\n  padding: 12px 16px;\n  font: 400 16px/22px var(--font-sans); color: var(--gray-800);\n}\n.skid-accordion:focus-within { outline: 2px solid var(--blue-400); outline-offset: -2px; }\n.skid-accordion[aria-disabled=\"true\"] { background: var(--gray-100); }\n.skid-accordion[aria-disabled=\"true\"] .skid-accordion__trigger { color: var(--gray-400); cursor: not-allowed; }\n\n/* ============================================================\n   AVATAR (extended — adds sizes + status badge)\n   ============================================================ */\n\n.skid-avatar {\n  position: relative;\n  display: inline-grid; place-items: center;\n  background: var(--gray-100);\n  color: var(--gray-800);\n  border-radius: 50%;\n  border: 2px solid var(--gray-300);\n  font-family: var(--font-sans); font-weight: 700;\n  text-transform: uppercase;\n  flex-shrink: 0;\n  /* No overflow:hidden — the status badge sits on the edge and must\n     be visible. The inner content is clipped by border-radius on a\n     dedicated inner face element. */\n}\n.skid-avatar__face {\n  position: absolute; inset: 0;\n  border-radius: 50%;\n  overflow: hidden;\n  display: grid; place-items: center;\n  background: inherit; color: inherit;\n}\n.skid-avatar img, .skid-avatar svg.skid-avatar__img,\n.skid-avatar__face img, .skid-avatar__face svg.skid-avatar__img {\n  width: 100%; height: 100%; object-fit: cover; display: block;\n}\n.skid-avatar--xs  { width: 24px;  height: 24px;  font-size: 9px; }\n.skid-avatar--sm  { width: 32px;  height: 32px;  font-size: 12px; }\n.skid-avatar--md  { width: 48px;  height: 48px;  font-size: 18px; }\n.skid-avatar--lg  { width: 64px;  height: 64px;  font-size: 22px; }\n.skid-avatar--xl  { width: 96px;  height: 96px;  font-size: 28px; }\n.skid-avatar--xxl { width: 124px; height: 124px; font-size: 36px; }\n\n.skid-avatar__badge {\n  position: absolute;\n  right: 0; bottom: 0;\n  width: 30%; height: 30%; min-width: 8px; min-height: 8px;\n  border-radius: 50%;\n  background: var(--green-800);\n  border: 2px solid var(--gray-0);\n  box-sizing: border-box;\n  z-index: 1;\n}\n.skid-avatar--xs .skid-avatar__badge,\n.skid-avatar--sm .skid-avatar__badge { border-width: 1.5px; right: -1px; bottom: -1px; }\n.skid-avatar__badge--away    { background: var(--orange-500); }\n.skid-avatar__badge--offline { background: var(--gray-400); }\n.skid-avatar__badge--busy    { background: var(--red-600); }\n\n/* Old simple avatar (used in header) — keep working */\n.skid-avatar:not([class*=\"--\"]) { width: 40px; height: 40px; font-size: 14px; background: var(--blue-100); color: var(--blue-800); border: 0; }\n\n/* ============================================================\n   CHECKBOX — extended (label + description + states)\n   ============================================================ */\n\n.skid-checkbox {\n  display: inline-flex; align-items: flex-start; gap: 12px;\n  font-family: var(--font-sans);\n  color: var(--gray-800);\n  cursor: pointer; user-select: none;\n}\n.skid-checkbox input { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; }\n.skid-checkbox__box {\n  width: 20px; height: 20px; border-radius: 2px;\n  border: 1px solid var(--gray-300);\n  background: var(--gray-0);\n  display: grid; place-items: center;\n  flex-shrink: 0;\n  transition: background 120ms, border-color 120ms, box-shadow 120ms;\n  margin-top: 1px;\n}\n.skid-checkbox__box svg { width: 14px; height: 14px; color: var(--gray-0); opacity: 0; transition: opacity 100ms; }\n\n.skid-checkbox:hover .skid-checkbox__box { border-color: var(--gray-600); }\n.skid-checkbox input:focus-visible + .skid-checkbox__box {\n  box-shadow: 0 0 0 1px var(--blue-400), 0 0 4px 0 var(--blue-400);\n}\n.skid-checkbox input:checked + .skid-checkbox__box,\n.skid-checkbox input:indeterminate + .skid-checkbox__box {\n  background: var(--blue-600); border-color: var(--blue-600);\n}\n.skid-checkbox input:checked + .skid-checkbox__box svg.check,\n.skid-checkbox input:indeterminate + .skid-checkbox__box svg.minus { opacity: 1; }\n\n.skid-checkbox input[disabled] + .skid-checkbox__box {\n  border-color: var(--gray-200); background: transparent;\n}\n.skid-checkbox input[disabled]:checked + .skid-checkbox__box {\n  background: var(--gray-200); border-color: var(--gray-200);\n}\n.skid-checkbox--error .skid-checkbox__box { border-color: var(--feedback-error); }\n.skid-checkbox input[disabled] ~ .skid-checkbox__text { color: var(--gray-400); }\n.skid-checkbox input[disabled] ~ .skid-checkbox__text .skid-checkbox__desc { color: var(--gray-400); }\n\n.skid-checkbox__text { display: flex; flex-direction: column; gap: 2px; }\n.skid-checkbox__label { font: 700 12px/18px var(--font-sans); letter-spacing: .5px; color: var(--gray-800); }\n.skid-checkbox__desc  { font: 400 12px/16px var(--font-sans); letter-spacing: .5px; color: var(--gray-700); }\n.skid-checkbox__err   { font: 400 12px/16px var(--font-sans); color: var(--feedback-error); margin-top: 2px; }\n\n/* ============================================================\n   DROPDOWN (select with chevron, supports tag chip)\n   ============================================================ */\n\n.skid-dropdown { display: flex; flex-direction: column; gap: 8px; width: 100%; }\n.skid-dropdown__label { font: 700 12px/16px var(--font-sans); color: var(--gray-800); }\n.skid-dropdown__control {\n  height: 48px; padding: 0 12px;\n  border: 1px solid var(--gray-300);\n  border-radius: 4px;\n  background: var(--surface-field);\n  display: flex; align-items: center; justify-content: space-between; gap: 8px;\n  cursor: pointer;\n  transition: border-color 120ms, box-shadow 120ms;\n}\n.skid-dropdown__control:hover { border-color: var(--gray-600); }\n.skid-dropdown__control[data-state=\"focus\"],\n.skid-dropdown__control:focus-visible { outline: none; border-color: var(--blue-400); box-shadow: 0 0 0 1px var(--blue-400); }\n.skid-dropdown__control[data-state=\"open\"] { border-color: var(--gray-600); }\n.skid-dropdown__value { font: 400 16px/24px var(--font-sans); color: var(--gray-800); display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }\n.skid-dropdown__value--placeholder { color: var(--gray-600); }\n.skid-dropdown__chip {\n  display: inline-flex; align-items: center; justify-content: center;\n  height: 24px; min-width: 24px; padding: 0 8px;\n  background: var(--blue-100); color: var(--blue-800);\n  border-radius: 999px;\n  font: 700 12px/1 var(--font-sans);\n}\n.skid-dropdown__icon { width: 20px; height: 20px; color: var(--gray-700); flex-shrink: 0; }\n.skid-dropdown__helper { font: 400 14px/20px var(--font-sans); color: var(--gray-700); }\n.skid-dropdown--error .skid-dropdown__control { border-color: var(--red-800); background: var(--gray-100); }\n.skid-dropdown--error .skid-dropdown__helper { color: var(--red-800); display: flex; align-items: center; gap: 8px; }\n.skid-dropdown[aria-disabled=\"true\"] .skid-dropdown__label,\n.skid-dropdown[aria-disabled=\"true\"] .skid-dropdown__value,\n.skid-dropdown[aria-disabled=\"true\"] .skid-dropdown__helper { color: var(--gray-400); }\n.skid-dropdown[aria-disabled=\"true\"] .skid-dropdown__control { border-color: var(--gray-200); background: transparent; cursor: not-allowed; }\n.skid-dropdown[aria-disabled=\"true\"] .skid-dropdown__icon { color: var(--gray-400); }\n\n/* ============================================================\n   DATE PICKER · CALENDAR\n   ============================================================ */\n\n.skid-calendar {\n  width: 300px; box-sizing: border-box;\n  background: var(--gray-100);\n  border: 1px solid var(--gray-300);\n  border-radius: 8px;\n  box-shadow: var(--elev-1);\n  overflow: hidden;\n  font-family: var(--font-sans);\n}\n.skid-calendar__head {\n  height: 56px; padding: 0 16px;\n  display: flex; align-items: center; justify-content: space-between;\n  border-bottom: 1px solid var(--gray-300);\n  background: var(--gray-100);\n}\n.skid-calendar__head button {\n  width: 24px; height: 24px; border: 0; background: transparent;\n  display: grid; place-items: center; cursor: pointer; color: var(--gray-700);\n  border-radius: 4px;\n}\n.skid-calendar__head button:hover { background: var(--gray-200); color: var(--gray-900); }\n.skid-calendar__title { font: 700 14px/20px var(--font-sans); color: var(--gray-800); }\n.skid-calendar__body { padding: 16px; }\n.skid-calendar__weeknames,\n.skid-calendar__week { display: grid; grid-template-columns: repeat(7,1fr); }\n.skid-calendar__wname {\n  width: 32px; height: 24px;\n  display: grid; place-items: center;\n  font: 700 12px/1 var(--font-sans); color: var(--gray-600);\n  letter-spacing: .5px;\n}\n/* Day cell fills its grid column (1fr) so range fills connect edge-to-edge.\n   A 32×32 visual pill is drawn via ::before so single-day selection /\n   today / hover still look like a centered circle. */\n.skid-calendar__day {\n  width: 100%; height: 32px;\n  display: grid; place-items: center;\n  font: 700 12px/1 var(--font-sans); color: var(--gray-800);\n  cursor: pointer; border: 0; background: transparent;\n  position: relative; z-index: 0;\n  padding: 0;\n}\n.skid-calendar__day::before {\n  content: \"\";\n  position: absolute; top: 0; bottom: 0; left: 50%; transform: translateX(-50%);\n  width: 32px; height: 32px;\n  border-radius: 4px;\n  z-index: -1;\n  background: transparent;\n}\n.skid-calendar__day:hover::before { background: var(--blue-50); }\n.skid-calendar__day:hover        { color: var(--blue-800); }\n.skid-calendar__day--today::before   { box-shadow: inset 0 0 0 1px var(--blue-600); }\n.skid-calendar__day--today           { color: var(--blue-700); }\n.skid-calendar__day--selected::before{ background: var(--blue-600); }\n.skid-calendar__day--selected        { color: var(--gray-0); }\n.skid-calendar__day--selected:hover::before { background: var(--blue-700); }\n.skid-calendar__day--empty { color: var(--gray-400); cursor: default; }\n.skid-calendar__day--empty::before { background: transparent; }\n.skid-calendar__day--empty:hover { color: var(--gray-400); }\n.skid-calendar__day--empty:hover::before { background: transparent; }\n\n/* Range — full-cell fill so cells visually connect. Endpoints get a\n   darker circle on top via ::before to mark start/end. */\n.skid-calendar__day--in-range,\n.skid-calendar__day--range-start,\n.skid-calendar__day--range-end { background: var(--blue-50); color: var(--blue-800); }\n.skid-calendar__day--in-range::before { background: transparent; }\n.skid-calendar__day--range-start { border-radius: 4px 0 0 4px; }\n.skid-calendar__day--range-end   { border-radius: 0 4px 4px 0; }\n.skid-calendar__day--range-start::before,\n.skid-calendar__day--range-end::before { background: var(--blue-600); }\n.skid-calendar__day--range-start,\n.skid-calendar__day--range-end { color: var(--gray-0); }\n.skid-calendar__day--range-start:hover::before,\n.skid-calendar__day--range-end:hover::before { background: var(--blue-700); }\n.skid-calendar__foot {\n  display: flex; gap: 8px; padding: 16px;\n  border-top: 1px solid var(--gray-300);\n  align-items: center; justify-content: space-between;\n}\n.skid-calendar__count { font: 400 14px/19px var(--font-sans); color: var(--gray-500); }\n\n/* ============================================================\n   FILE ROW\n   Per Figma: 40×40 icon tile with 2px blue border (default) /\n   1px colored border for success/error states, NO background fill.\n   File name: Lato REGULAR 14px/19px gray-700.\n   Status + size meta: Lato REGULAR 12px/16px gray-400.\n   ============================================================ */\n\n.skid-file-row {\n  display: grid; grid-template-columns: 40px 1fr 24px; gap: 12px;\n  padding: 12px 16px;\n  background: var(--gray-0);\n  border: 1px solid var(--gray-300);\n  border-radius: 8px;\n  box-shadow: var(--elev-1);\n  align-items: center;\n  font-family: var(--font-sans);\n}\n.skid-file-row__icon {\n  width: 40px; height: 40px; border-radius: 8px;\n  background: transparent;\n  border: 2px solid var(--blue-600);\n  color: var(--blue-600);\n  display: grid; place-items: center;\n  flex-shrink: 0;\n}\n.skid-file-row__icon svg { width: 24px; height: 24px; }\n.skid-file-row--success .skid-file-row__icon { border: 1px solid var(--green-800); color: var(--green-800); }\n.skid-file-row--error   .skid-file-row__icon { border: 1px solid var(--red-800);   color: var(--red-800); }\n\n.skid-file-row__main { min-width: 0; display: flex; flex-direction: column; gap: 6px; }\n.skid-file-row__title-row {\n  display: flex; align-items: center; justify-content: space-between; gap: 8px;\n}\n.skid-file-row__title {\n  font: 400 14px/19px var(--font-sans);\n  color: var(--gray-700);\n  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;\n}\n.skid-file-row__pct {\n  font: 400 14px/19px var(--font-sans);\n  color: var(--gray-700);\n  flex-shrink: 0;\n}\n.skid-file-row__bar {\n  height: 6px; background: var(--gray-300); border-radius: 999px; overflow: hidden;\n}\n.skid-file-row__bar > i {\n  display: block; height: 100%; border-radius: 999px;\n  background: var(--blue-600);\n  position: relative;\n}\n.skid-file-row--uploading .skid-file-row__bar > i::after {\n  content: \"\"; position: absolute; inset: 0;\n  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.5) 50%, transparent 100%);\n  animation: skid-shimmer 1.4s infinite;\n  border-radius: inherit;\n}\n.skid-file-row--success .skid-file-row__bar > i { background: var(--green-800); width: 100%; }\n.skid-file-row--error   .skid-file-row__bar > i { background: var(--red-800); width: 100%; }\n\n.skid-file-row__status-row {\n  display: flex; align-items: center; justify-content: space-between; gap: 8px;\n}\n.skid-file-row__status,\n.skid-file-row__size {\n  font: 400 12px/16px var(--font-sans);\n  color: var(--gray-400);\n}\n.skid-file-row--error .skid-file-row__status { color: var(--red-800); }\n.skid-file-row--success .skid-file-row__status { color: var(--green-800); }\n\n.skid-file-row__action {\n  width: 24px; height: 24px; border: 0; background: transparent;\n  color: var(--gray-600); cursor: pointer; border-radius: 4px;\n  display: grid; place-items: center;\n  align-self: center;\n}\n.skid-file-row__action:hover { background: var(--gray-100); color: var(--gray-900); }\n.skid-file-row__action svg { width: 24px; height: 24px; }\n\n/* drop zone */\n.skid-dropzone {\n  border: 2px dashed var(--gray-300);\n  border-radius: 8px;\n  background: var(--gray-100);\n  padding: 32px;\n  text-align: center;\n  display: flex; flex-direction: column; align-items: center; gap: 12px;\n}\n.skid-dropzone__icon { width: 32px; height: 32px; color: var(--gray-600); }\n.skid-dropzone__title { font: 700 16px/22px var(--font-sans); color: var(--gray-800); }\n.skid-dropzone__desc  { font: 400 14px/19px var(--font-sans); color: var(--gray-700); }\n.skid-dropzone--uploading { border-style: solid; border-color: var(--blue-600); padding-top: 16px; padding-bottom: 16px; text-align: left; }\n.skid-dropzone--success   { border-style: solid; border-color: var(--green-800); padding-top: 16px; padding-bottom: 16px; text-align: left; }\n.skid-dropzone--error     { border-style: solid; border-color: var(--red-800);  padding-top: 16px; padding-bottom: 16px; text-align: left; }\n\n/* ============================================================\n   IMAGE CAROUSEL — per Figma 480×416 spec\n   - Photo slot 480×360 with 6px radius and 1px gray-300 border\n   - \"n/total\" outline badge in bottom-left of image\n   - Secondary icon button (expand) in bottom-right of image\n   - Below: ghost chevron prev, 5 navigation dots scaled by proximity\n     (distant 10px, near 12px, active 16px), ghost chevron next\n   ============================================================ */\n\n.skid-carousel {\n  position: relative;\n  width: 100%; max-width: 480px;\n  display: flex; flex-direction: column; gap: 16px;\n  font-family: var(--font-sans);\n}\n.skid-carousel__photo {\n  position: relative;\n  width: 100%;\n  aspect-ratio: 4 / 3;\n  border-radius: 6px;\n  border: 1px solid var(--gray-300);\n  overflow: hidden;\n  background: var(--gray-100);\n}\n.skid-carousel__track {\n  display: flex; width: 100%; height: 100%;\n  transition: transform 280ms cubic-bezier(0.2,0,0,1);\n}\n.skid-carousel__slide {\n  flex: 0 0 100%; height: 100%; min-width: 0;\n  display: grid; place-items: center;\n  background: var(--gray-100); color: var(--gray-500);\n  font: 700 14px/1 var(--font-sans);\n}\n.skid-carousel__slide img { width: 100%; height: 100%; object-fit: cover; display: block; }\n\n/* Counter pill — bottom-left, Blue outline badge */\n.skid-carousel__counter {\n  position: absolute; left: 12px; bottom: 12px;\n  display: inline-flex; align-items: center;\n  height: 26px; padding: 4px 8px;\n  border-radius: 2px;\n  background: var(--blue-50);\n  border: 1px solid var(--blue-600);\n  font: 700 12px/18px var(--font-sans);\n  letter-spacing: 0.35px;\n  color: var(--gray-800);\n}\n\n/* Expand affordance — bottom-right secondary icon button */\n.skid-carousel__expand {\n  position: absolute; right: 12px; bottom: 12px;\n  width: 32px; height: 32px;\n  border-radius: 4px;\n  background: var(--blue-600);\n  color: var(--gray-0);\n  border: 0;\n  display: grid; place-items: center;\n  cursor: pointer;\n}\n.skid-carousel__expand:hover { background: var(--blue-700); }\n.skid-carousel__expand svg { width: 18px; height: 18px; }\n\n/* Navigation row */\n.skid-carousel__nav {\n  display: flex; align-items: center; justify-content: center; gap: 12px;\n  height: 40px;\n}\n.skid-carousel__chev {\n  width: 32px; height: 32px;\n  border-radius: 4px;\n  background: transparent;\n  border: 0;\n  color: var(--blue-600);\n  display: grid; place-items: center;\n  cursor: pointer;\n  flex-shrink: 0;\n}\n.skid-carousel__chev:hover { background: var(--gray-100); }\n.skid-carousel__chev:disabled { color: var(--gray-400); cursor: not-allowed; background: transparent; }\n.skid-carousel__chev svg { width: 20px; height: 20px; }\n\n.skid-carousel__dots {\n  display: flex; align-items: center; gap: 8px;\n}\n.skid-carousel__dot {\n  border-radius: 50%;\n  background: var(--gray-300);\n  border: 0;\n  cursor: pointer;\n  padding: 0;\n  transition: background 120ms, width 120ms, height 120ms;\n  flex-shrink: 0;\n}\n/* Sizes by proximity */\n.skid-carousel__dot         { width: 12px; height: 12px; }\n.skid-carousel__dot--distant{ width: 10px; height: 10px; background: var(--gray-400); }\n.skid-carousel__dot--active { width: 16px; height: 16px; background: var(--blue-600); }\n.skid-carousel__dot:focus-visible {\n  outline: none;\n  box-shadow: 0 0 0 1px var(--blue-400), 0 0 0 4px rgba(90,191,224,0.35);\n}\n\n/* ============================================================\n   LINK (extended)\n   ============================================================ */\n\n.skid-link {\n  color: var(--blue-700);\n  font-family: var(--font-sans);\n  text-decoration: none;\n  cursor: pointer;\n  border-radius: 4px;\n  display: inline-flex; align-items: center; gap: 4px;\n  transition: color 120ms, text-decoration-color 120ms;\n}\n.skid-link:hover { color: var(--blue-950); }\n.skid-link:active { color: var(--blue-800); }\n.skid-link:focus-visible {\n  outline: 1px solid var(--blue-400);\n  outline-offset: 2px;\n  box-shadow: 0 0 0 4px rgba(90,191,224,0.35);\n}\n.skid-link svg { width: 1em; height: 1em; }\n\n/* sizes */\n.skid-link--sm { font: 400 14px/21px var(--font-sans); }\n.skid-link--md { font: 400 16px/22px var(--font-sans); }\n.skid-link--lg { font: 700 22px/22px var(--font-sans); }\n\n/* styles */\n.skid-link--standalone { text-decoration: none; }\n.skid-link--inline     { text-decoration: underline; text-underline-offset: 2px; }\n.skid-link--standalone:hover { text-decoration: underline; }\n\n/* ============================================================\n   MENU — per Figma\n   Container: gray-100 bg, 1px gray-300 border, 8px radius, soft shadow.\n   Items: 35px tall, 6px radius, 8px 6px padding, 8px gap.\n   Label: Lato Regular 14px/19px gray-800.\n   Shortcut: plain Lato Regular 14px gray-700 (\"⌘C\"). NO kbd boxes.\n   Submenu: trailing chevron-right (16×16) gray-700.\n   Hover: gray-200 bg.\n   Destructive: red-800 text default, red-600 bg + white text on hover.\n   ============================================================ */\n\n.skid-menu {\n  background: var(--gray-100);\n  border: 1px solid var(--gray-300);\n  border-radius: 8px;\n  box-shadow: 0 4px 8px 0 rgba(55,65,80,0.10), 0 2px 4px 0 rgba(45,55,70,0.15);\n  padding: 16px;\n  min-width: 180px;\n  display: flex; flex-direction: column; gap: 2px;\n  font-family: var(--font-sans);\n}\n.skid-menu__group { display: flex; flex-direction: column; gap: 2px; }\n.skid-menu__heading {\n  font: 700 11px/1 var(--font-sans); letter-spacing: 0.4px; text-transform: uppercase;\n  color: var(--gray-500); padding: 8px 6px 4px;\n}\n.skid-menu__divider { height: 1px; background: var(--gray-300); margin: 4px -16px; border: 0; }\n\n.skid-menu-item {\n  width: 100%; box-sizing: border-box;\n  background: transparent; border: 0;\n  display: flex; align-items: center; gap: 8px;\n  padding: 8px 6px;\n  border-radius: 6px;\n  font: 400 14px/19px var(--font-sans); color: var(--gray-800);\n  cursor: pointer;\n  text-align: left;\n  text-decoration: none;\n}\n.skid-menu-item:hover, .skid-menu-item[data-state=\"hover\"] { background: var(--gray-200); }\n.skid-menu-item svg { width: 16px; height: 16px; flex-shrink: 0; color: var(--gray-700); }\n.skid-menu-item__label { flex: 1; min-width: 0; }\n.skid-menu-item__shortcut {\n  font: 400 14px/19px var(--font-sans);\n  color: var(--gray-700);\n  white-space: nowrap;\n  margin-left: 8px;\n}\n.skid-menu-item__chev { width: 16px; height: 16px; color: var(--gray-700); flex-shrink: 0; }\n.skid-menu-item--destructive { color: var(--red-800); }\n.skid-menu-item--destructive svg { color: var(--red-800); }\n.skid-menu-item--destructive:hover { background: var(--red-600); color: var(--gray-0); }\n.skid-menu-item--destructive:hover svg { color: var(--gray-0); }\n.skid-menu-item[aria-disabled=\"true\"] { color: var(--gray-400); pointer-events: none; }\n.skid-menu-item[aria-disabled=\"true\"] svg { color: var(--gray-400); }\n\n/* ============================================================\n   METRICS — per Figma\n   171×140 white card, no border, 8px radius, 24px padding.\n   Title: Lato Bold 14px/20px gray-700.\n   Value: Lato Bold 32px/40px gray-800 with 0.6px tracking (Lato, NOT mono).\n   Delta: Lato Bold 12px/16px — green-800 up / red-800 down /\n   gray-600 flat. Plain text glyph, no icon.\n   ============================================================ */\n\n.skid-metric {\n  background: var(--gray-0);\n  border: 0;\n  border-radius: 8px;\n  padding: 24px;\n  display: flex; flex-direction: column; gap: 12px;\n  min-width: 171px;\n  font-family: var(--font-sans);\n}\n.skid-metric__title { font: 700 14px/20px var(--font-sans); color: var(--gray-700); }\n.skid-metric__stat  { display: flex; flex-direction: column; gap: 4px; }\n.skid-metric__value {\n  font: 700 32px/40px var(--font-sans);\n  letter-spacing: 0.6px;\n  color: var(--gray-800);\n}\n.skid-metric__delta {\n  font: 700 12px/16px var(--font-sans);\n}\n.skid-metric__delta--up   { color: var(--green-800); }\n.skid-metric__delta--down { color: var(--red-800); }\n.skid-metric__delta--flat { color: var(--gray-600); }\n\n/* ============================================================\n   NUMBER INPUT\n   ============================================================ */\n\n.skid-number-input { display: flex; flex-direction: column; gap: 8px; width: 120px; }\n.skid-number-input__label { font: 700 12px/16px var(--font-sans); color: var(--gray-800); }\n.skid-number-input__control {\n  height: 48px; padding: 0 12px;\n  border-radius: 4px;\n  background: var(--surface-field);\n  border: 1px solid var(--gray-300);\n  display: flex; align-items: center; justify-content: space-between; gap: 4px;\n  transition: border-color 120ms, box-shadow 120ms;\n}\n.skid-number-input__control:hover { border-color: var(--gray-600); }\n.skid-number-input__control:focus-within { border-color: var(--blue-500); box-shadow: 0 0 0 1px var(--blue-500); }\n.skid-number-input__btn {\n  width: 24px; height: 24px; border-radius: 4px;\n  background: transparent; border: 0;\n  display: grid; place-items: center;\n  color: var(--gray-700); cursor: pointer;\n}\n.skid-number-input__btn:hover { background: var(--gray-200); color: var(--gray-900); }\n.skid-number-input__btn:disabled { color: var(--gray-400); cursor: not-allowed; background: transparent; }\n.skid-number-input__value {\n  flex: 1; height: 100%; min-width: 0;\n  border: 0; background: transparent;\n  text-align: center;\n  font: 400 16px/22px var(--font-sans); color: var(--gray-800);\n}\n.skid-number-input__value:focus { outline: none; }\n.skid-number-input__helper { font: 400 14px/19px var(--font-sans); color: var(--gray-700); }\n.skid-number-input--error .skid-number-input__control { border-color: var(--red-800); }\n.skid-number-input--error .skid-number-input__helper { color: var(--red-800); display: flex; align-items: center; gap: 8px; }\n.skid-number-input[aria-disabled=\"true\"] .skid-number-input__control { background: transparent; }\n.skid-number-input[aria-disabled=\"true\"] .skid-number-input__value { color: var(--gray-400); }\n\n/* ============================================================\n   PAGINATION\n   ============================================================ */\n\n.skid-pagination {\n  display: inline-flex; gap: 4px; align-items: center;\n}\n.skid-pagination__page,\n.skid-pagination__nav {\n  width: 32px; height: 32px; padding: 0;\n  border-radius: 4px;\n  background: var(--gray-0);\n  border: 1px solid var(--gray-300);\n  display: grid; place-items: center;\n  font: 700 14px/20px var(--font-sans); color: var(--gray-800);\n  cursor: pointer;\n}\n.skid-pagination__page:hover,\n.skid-pagination__nav:hover { background: var(--gray-200); }\n.skid-pagination__page[aria-current=\"page\"] {\n  background: var(--gray-0);\n  border-color: var(--blue-600);\n  color: var(--blue-700);\n}\n.skid-pagination__page[disabled],\n.skid-pagination__nav[disabled] {\n  color: var(--gray-400); cursor: not-allowed; background: var(--gray-0); border-color: var(--gray-200);\n}\n.skid-pagination__nav svg { width: 18px; height: 18px; color: currentColor; }\n.skid-pagination__ellipsis { padding: 0 6px; color: var(--gray-500); font-weight: 700; }\n.skid-pagination__summary { margin-left: 12px; font: 400 14px/19px var(--font-sans); color: var(--gray-700); }\n\n/* ============================================================\n   PASSWORD INPUT\n   ============================================================ */\n\n.skid-password { display: flex; flex-direction: column; gap: 8px; width: 100%; }\n.skid-password__label { font: 700 12px/16px var(--font-sans); color: var(--gray-800); }\n.skid-password__control {\n  height: 48px; padding: 0 12px;\n  border-radius: 4px;\n  background: var(--surface-field);\n  border: 1px solid var(--gray-300);\n  display: flex; align-items: center; gap: 8px;\n  transition: border-color 120ms, box-shadow 120ms;\n}\n.skid-password__control:hover { border-color: var(--gray-600); }\n.skid-password__control:focus-within { border-color: var(--blue-500); box-shadow: 0 0 0 1px var(--blue-500); }\n.skid-password input {\n  flex: 1; min-width: 0; height: 100%;\n  border: 0; background: transparent; outline: none;\n  font: 400 16px/22px var(--font-sans); color: var(--gray-800);\n}\n.skid-password input::placeholder { color: var(--gray-600); }\n.skid-password__toggle {\n  width: 24px; height: 24px; border: 0; background: transparent;\n  display: grid; place-items: center;\n  color: var(--gray-700); cursor: pointer;\n  flex-shrink: 0;\n}\n.skid-password__toggle:hover { color: var(--gray-900); }\n.skid-password__helper { font: 400 14px/19px var(--font-sans); color: var(--gray-700); }\n.skid-password--error .skid-password__control { border-color: var(--red-800); }\n.skid-password--error input { color: var(--red-800); }\n.skid-password--error .skid-password__helper { color: var(--red-800); display: flex; gap: 8px; align-items: center; }\n\n/* ============================================================\n   POPOVER\n   ============================================================ */\n\n.skid-popover {\n  background: var(--gray-100);\n  border: 1px solid var(--gray-300);\n  border-radius: 8px;\n  box-shadow: var(--elev-3);\n  padding: 16px;\n  min-width: 200px; max-width: 360px;\n  position: relative;\n  font: 400 14px/19px var(--font-sans); color: var(--gray-800);\n}\n.skid-popover__title {\n  font: 700 14px/19px var(--font-sans);\n  color: var(--gray-900);\n  margin: 0 0 6px;\n}\n.skid-popover__body { color: var(--gray-700); }\n.skid-popover__arrow {\n  position: absolute; width: 12px; height: 12px;\n  background: var(--gray-100);\n  border: 1px solid var(--gray-300);\n  transform: rotate(45deg);\n  border-radius: 2px;\n}\n.skid-popover__arrow--top    { top: -7px; left: 24px; border-bottom: 0; border-right: 0; }\n.skid-popover__arrow--bottom { bottom: -7px; left: 24px; border-top: 0; border-left: 0; }\n.skid-popover__arrow--left   { top: 24px; left: -7px; border-top: 0; border-right: 0; }\n.skid-popover__arrow--right  { top: 24px; right: -7px; border-bottom: 0; border-left: 0; }\n.skid-popover__actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }\n\n/* ============================================================\n   PROGRESS BAR (extended)\n   ============================================================ */\n\n.skid-progress {\n  height: 6px; background: var(--gray-300); border-radius: 999px; overflow: hidden;\n  width: 100%;\n}\n.skid-progress--compact { height: 4px; }\n.skid-progress__fill {\n  display: block; height: 100%;\n  background: var(--blue-600);\n  border-radius: 999px;\n  transition: width 240ms cubic-bezier(0.2,0,0,1);\n  position: relative;\n  overflow: hidden; /* clip the shimmer sweep to the fill, not the gray track */\n}\n.skid-progress--uploading .skid-progress__fill { background: var(--blue-600); }\n.skid-progress--uploading .skid-progress__fill::after {\n  content: \"\"; position: absolute; inset: 0;\n  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.5) 50%, transparent 100%);\n  animation: skid-shimmer 1.4s infinite;\n  border-radius: inherit;\n}\n.skid-progress--success .skid-progress__fill { background: var(--green-800); }\n.skid-progress--error   .skid-progress__fill { background: var(--red-800); }\n@keyframes skid-shimmer {\n  0%   { transform: translateX(-100%); }\n  100% { transform: translateX(100%); }\n}\n\n/* ============================================================\n   RADIO BUTTON (extended)\n   ============================================================ */\n\n.skid-radio {\n  display: inline-flex; align-items: flex-start; gap: 12px;\n  font-family: var(--font-sans); color: var(--gray-800);\n  cursor: pointer; user-select: none;\n}\n.skid-radio input { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; }\n.skid-radio__circle {\n  width: 20px; height: 20px; border-radius: 50%;\n  border: 1px solid var(--gray-500);\n  background: var(--gray-0);\n  display: grid; place-items: center; flex-shrink: 0;\n  transition: border-color 120ms, box-shadow 120ms;\n  margin-top: 1px;\n  position: relative;\n}\n.skid-radio:hover .skid-radio__circle { border-color: var(--gray-700); }\n.skid-radio input:focus-visible + .skid-radio__circle {\n  box-shadow: 0 0 0 1px var(--blue-400), 0 0 4px 0 var(--blue-400);\n}\n.skid-radio__circle::after {\n  content: \"\"; width: 10px; height: 10px; border-radius: 50%;\n  background: var(--blue-600);\n  opacity: 0; transition: opacity 100ms;\n}\n.skid-radio input:checked + .skid-radio__circle::after { opacity: 1; }\n.skid-radio input:checked + .skid-radio__circle { border-color: var(--blue-600); }\n.skid-radio input[disabled] + .skid-radio__circle { border-color: var(--gray-200); background: transparent; }\n.skid-radio input[disabled]:checked + .skid-radio__circle::after { background: var(--gray-300); }\n.skid-radio input[disabled] ~ .skid-checkbox__text { color: var(--gray-400); }\n\n.skid-radio__text { display: flex; flex-direction: column; gap: 2px; }\n.skid-radio__label { font: 700 12px/18px var(--font-sans); letter-spacing: .5px; color: var(--gray-800); }\n.skid-radio__desc  { font: 400 12px/16px var(--font-sans); letter-spacing: .5px; color: var(--gray-700); }\n.skid-radio--error .skid-radio__circle { border-color: var(--red-800); }\n.skid-radio--error .skid-radio__err  { font: 400 12px/16px var(--font-sans); color: var(--feedback-error); margin-top: 2px; }\n\n.skid-radio-group { display: flex; flex-direction: column; gap: 12px; }\n.skid-radio-group--horizontal { flex-direction: row; gap: 24px; }\n\n/* ============================================================\n   SEARCH\n   ============================================================ */\n\n.skid-search {\n  width: 100%; max-width: 360px;\n  position: relative;\n}\n.skid-search__control {\n  height: 48px; padding: 0 12px;\n  border-radius: 4px;\n  background: var(--surface-field);\n  border: 1px solid var(--gray-300);\n  display: flex; align-items: center; gap: 8px;\n  transition: border-color 120ms, box-shadow 120ms;\n}\n.skid-search__control:hover { border-color: var(--gray-600); }\n.skid-search__control:focus-within { border-color: var(--blue-500); box-shadow: 0 0 0 1px var(--blue-500); }\n.skid-search__icon { width: 20px; height: 20px; color: var(--gray-700); flex-shrink: 0; }\n.skid-search input {\n  flex: 1; min-width: 0; height: 100%;\n  border: 0; background: transparent; outline: none;\n  font: 400 16px/22px var(--font-sans); color: var(--gray-800);\n}\n.skid-search input::placeholder { color: var(--gray-600); }\n.skid-search__clear {\n  width: 24px; height: 24px; border: 0; background: transparent;\n  display: grid; place-items: center;\n  color: var(--gray-600); cursor: pointer; border-radius: 999px;\n  flex-shrink: 0;\n}\n.skid-search__clear:hover { color: var(--gray-900); background: var(--gray-200); }\n.skid-search--icon-only .skid-search__control { width: 48px; padding: 0; justify-content: center; }\n\n/* ============================================================\n   SEGMENTED CONTROL\n   ============================================================ */\n\n.skid-segmented {\n  display: inline-flex;\n  border-radius: 4px;\n  border: 1px solid var(--gray-300);\n  overflow: hidden;\n  background: var(--gray-0);\n}\n.skid-segmented__seg {\n  background: var(--gray-0);\n  border: 0; border-right: 1px solid var(--gray-300);\n  padding: 8px 16px; height: 34px;\n  font: 700 14px/1 var(--font-sans); color: var(--gray-800);\n  cursor: pointer;\n  display: inline-flex; align-items: center; gap: 6px;\n}\n.skid-segmented__seg:last-child { border-right: 0; }\n.skid-segmented__seg:hover { background: var(--gray-100); }\n.skid-segmented__seg[aria-selected=\"true\"] {\n  background: var(--blue-600); color: var(--gray-0);\n}\n.skid-segmented__seg[aria-selected=\"true\"]:hover { background: var(--blue-700); }\n.skid-segmented__seg[disabled] { color: var(--gray-400); cursor: not-allowed; }\n.skid-segmented svg { width: 14px; height: 14px; }\n\n/* ============================================================\n   SELECT (same as Dropdown — alias for clarity)\n   The Skid file separates \"Select\" (single value) from \"Dropdown\"\n   (multi-select with chips). They share styling.\n   ============================================================ */\n\n.skid-select-field {\n  /* This is the wrapper version. The `.skid-select` class (existing,\n     applied directly to a <select>) handles native fallback. */\n  display: flex; flex-direction: column; gap: 8px; width: 100%;\n}\n.skid-select-field__label { font: 700 12px/16px var(--font-sans); color: var(--gray-800); }\n.skid-select-field__helper { font: 400 14px/19px var(--font-sans); color: var(--gray-700); }\n.skid-select-field--error .skid-select-field__helper { color: var(--red-800); display: flex; gap: 8px; align-items: center; }\n.skid-select-field[aria-disabled=\"true\"] .skid-select-field__label,\n.skid-select-field[aria-disabled=\"true\"] .skid-select-field__helper { color: var(--gray-400); }\n\n/* the field reuses .skid-input + .skid-select chevron, but we add an option list */\n.skid-select-list {\n  margin-top: 4px;\n  background: var(--gray-0);\n  border: 1px solid var(--gray-300);\n  border-radius: 4px;\n  box-shadow: var(--elev-3);\n  max-height: 320px; overflow-y: auto;\n  padding: 4px;\n}\n.skid-select-option {\n  padding: 10px 12px; border-radius: 4px;\n  font: 400 14px/19px var(--font-sans); color: var(--gray-800);\n  cursor: pointer;\n  display: flex; align-items: center; gap: 8px;\n}\n.skid-select-option:hover { background: var(--gray-100); }\n.skid-select-option[aria-selected=\"true\"] { background: var(--blue-50); color: var(--blue-800); font-weight: 700; }\n.skid-select-option svg { width: 16px; height: 16px; margin-left: auto; color: var(--blue-600); }\n\n/* ============================================================\n   SKELETON\n   ============================================================ */\n\n@keyframes skid-pulse {\n  0%, 100% { background-color: var(--gray-200); }\n  50%      { background-color: var(--gray-300); }\n}\n.skid-skel {\n  background: var(--gray-200);\n  border-radius: 4px;\n  animation: skid-pulse 1.4s ease-in-out infinite;\n}\n.skid-skel--circle { border-radius: 50%; }\n.skid-skel--text   { height: 14px; border-radius: 4px; }\n.skid-skel--text + .skid-skel--text { margin-top: 8px; }\n.skid-skel--block  { height: 96px; border-radius: 6px; }\n\n/* ============================================================\n   SLIDER — per Figma\n   Track: 4px tall, gray-300, full width.\n   Filled track: blue-600.\n   Thumb: 24×24 circle, blue-600 fill with 2px white border.\n   Hover: 32×32 gray-200 halo around thumb.\n   Active (dragging): thumb scales to 32px.\n   Focus: blue-400 ring around thumb.\n   Disabled: gray-200 track, gray-150 thumb, gray-400 filled track.\n   Value badge: 25×19 blue-600 chip with downward triangle arrow,\n   12px Lato Regular white text with 0.5px tracking.\n   Min/max labels: Lato Bold 12px gray-700, below ends of track.\n   ============================================================ */\n\n.skid-slider {\n  position: relative; width: 100%;\n  padding-top: 36px; padding-bottom: 24px;\n  font-family: var(--font-sans);\n}\n.skid-slider__track {\n  height: 4px; background: var(--gray-300);\n  position: relative;\n}\n.skid-slider__fill {\n  position: absolute; left: 0; top: 0; height: 100%;\n  background: var(--blue-600);\n}\n.skid-slider__thumb {\n  position: absolute; top: 50%; transform: translate(-50%, -50%);\n  width: 24px; height: 24px;\n  background: var(--blue-600); border: 2px solid var(--gray-0);\n  border-radius: 50%; box-shadow: 0 1px 4px rgba(0,0,0,0.18);\n  cursor: pointer;\n  box-sizing: border-box;\n  z-index: 2;\n}.skid-slider__thumb::before {\n  /* Hover halo — 32×32 gray-200 ellipse behind the thumb */\n  content: \"\"; position: absolute;\n  top: 50%; left: 50%; transform: translate(-50%, -50%);\n  width: 32px; height: 32px; border-radius: 50%;\n  background: transparent;\n  z-index: -1;\n}\n.skid-slider__thumb:hover::before { background: var(--gray-200); }\n.skid-slider__thumb:active,\n.skid-slider__thumb--active {\n  width: 32px; height: 32px;\n}\n.skid-slider__thumb:focus-visible {\n  outline: none;\n  box-shadow: 0 0 0 4px rgba(90,191,224,0.35), 0 1px 4px rgba(0,0,0,0.18);\n}\n.skid-slider__badge {\n  position: absolute; top: 0; transform: translate(-50%, 0);\n  height: 19px; padding: 0 4px;\n  background: var(--blue-600); color: var(--gray-0);\n  border-radius: 4px;\n  font: 400 12px/19px var(--font-sans); letter-spacing: 0.5px;\n  text-align: center;\n  min-width: 17px;\n}\n.skid-slider__badge::after {\n  content: \"\"; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);\n  width: 0; height: 0;\n  border-left: 4px solid transparent;\n  border-right: 4px solid transparent;\n  border-top: 5px solid var(--blue-600);\n}\n.skid-slider__labels {\n  display: flex; justify-content: space-between;\n  margin-top: 12px; font: 700 12px/16px var(--font-sans); color: var(--gray-700);\n}\n\n/* Disabled */\n.skid-slider--disabled .skid-slider__track { background: var(--gray-200); }\n.skid-slider--disabled .skid-slider__fill  { background: var(--gray-400); }\n.skid-slider--disabled .skid-slider__thumb { background: var(--gray-150); cursor: not-allowed; }\n.skid-slider--disabled .skid-slider__thumb:hover::before { background: transparent; }\n.skid-slider--disabled .skid-slider__badge { background: var(--gray-400); }\n.skid-slider--disabled .skid-slider__badge::after { border-top-color: var(--gray-400); }\n.skid-slider--disabled .skid-slider__labels { color: var(--gray-400); }\n\n/* ============================================================\n   STAR RATING — per Figma\n   Row of 5 × 24px stars with 4px gap.\n   Stroke: Blue-600 (uShip brand). Stroke width 1.5px.\n   Empty (no rating): transparent fill, Blue-600 outline.\n   Filled: Blue-600 fill.\n   Unrated in a partial display: Gray-300 fill with Blue-600 outline.\n   ============================================================ */\n\n.skid-star-rating {\n  display: inline-flex; align-items: center;\n  gap: 4px;\n  font-family: var(--font-sans);\n}\n.skid-star-rating__star {\n  width: 24px; height: 24px;\n  color: var(--blue-600);  /* drives the outline */\n  flex-shrink: 0;\n  display: inline-block;\n}\n.skid-star-rating__star svg { width: 100%; height: 100%; display: block; }\n.skid-star-rating__star--empty   svg { fill: var(--surface-layer-01); }\n.skid-star-rating__star--filled  svg { fill: var(--blue-600); }\n.skid-star-rating__star--unrated svg { fill: var(--surface-layer-01); }\n\n/* ============================================================\n   STEP INDICATOR — per Figma\n   Two types: Dot (compac
