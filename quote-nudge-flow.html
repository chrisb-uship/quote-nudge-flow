t, no labels) and Labeled (32px circle + label).\n\n   Dot:\n     Upcoming  = 8×8 gray-400 circle\n     Active    = 20×8 blue-500 pill (rounded capsule)\n     Completed = 8×8 blue-600 circle\n\n   Labeled (32×32 circle + 12px label):\n     Upcoming  = transparent + 1px gray-300 border, gray-700 numeral, gray-700 label\n     Active    = blue-500 fill, white numeral, blue-500 label (all bold)\n     Completed = blue-500 fill + check icon, blue-500 label (medium weight)\n\n   Connector line between Labeled steps = 2px rounded bar.\n     Filled (between completed/active) = blue-500.\n     Empty (between upcoming) = gray-300.\n   ============================================================ */\n\n.skid-step-indicator {\n  display: flex; align-items: center;\n  gap: 0;\n  font-family: var(--font-sans);\n}\n\n/* ----- Dot type ----- */\n.skid-step-indicator--dots { gap: 8px; }\n.skid-step-indicator--dots .skid-step-indicator__step {\n  width: 24px; height: 24px;\n  display: grid; place-items: center;\n  flex-shrink: 0; min-width: auto;\n}\n.skid-step-indicator--dots .skid-step-indicator__dot {\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: var(--gray-400);\n  border: 0;\n  display: block;\n  color: transparent;\n  font-size: 0;\n}\n.skid-step-indicator--dots .skid-step-indicator__step--active .skid-step-indicator__dot {\n  width: 20px; height: 8px;\n  border-radius: 4px;\n  background: var(--icon-loading);\n}\n.skid-step-indicator--dots .skid-step-indicator__step--completed .skid-step-indicator__dot {\n  background: var(--interactive-default);\n}\n\n/* ----- Labeled type ----- */\n.skid-step-indicator__step {\n  display: flex; flex-direction: column; align-items: center; gap: 6px;\n  flex-shrink: 0; min-width: 34px;\n}\n.skid-step-indicator__dot {\n  width: 32px; height: 32px; border-radius: 100px;\n  border: 1px solid var(--gray-300);\n  background: transparent;\n  display: grid; place-items: center;\n  font: 400 12px/16px var(--font-sans); color: var(--gray-700);\n}\n.skid-step-indicator__dot svg { width: 16px; height: 16px; color: #fff; }\n.skid-step-indicator__step--active .skid-step-indicator__dot {\n  background: var(--icon-loading); border-color: var(--icon-loading); color: #fff;\n  font-weight: 700;\n}\n.skid-step-indicator__step--completed .skid-step-indicator__dot {\n  background: var(--icon-loading); border-color: var(--icon-loading); color: #fff;\n}\n.skid-step-indicator__label {\n  font: 700 12px/16px var(--font-sans);\n  color: var(--gray-700);\n  text-align: center;\n  white-space: nowrap;\n}\n.skid-step-indicator__step--active .skid-step-indicator__label {\n  color: var(--icon-loading); font-weight: 700;\n}\n.skid-step-indicator__step--completed .skid-step-indicator__label {\n  color: var(--icon-loading); font-weight: 500;\n}\n\n/* ----- Connector lines between Labeled steps ----- */\n.skid-step-indicator__line {\n  flex: 1; min-width: 24px; height: 2px;\n  background: var(--gray-300);\n  border-radius: 999px;\n  margin: 0 8px;\n  align-self: flex-start;\n  margin-top: 15px; /* center on 32px circle */\n}\n.skid-step-indicator__line--complete { background: var(--icon-loading); }\n\n/* ============================================================\n   TABS — Extended (underline already exists; add contained)\n   ============================================================ */\n\n.skid-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--gray-300); }\n.skid-tabs__tab {\n  padding: 12px 16px;\n  background: transparent; border: 0;\n  font: 400 16px/22px var(--font-sans); color: var(--gray-700);\n  cursor: pointer; position: relative;\n  display: inline-flex; align-items: center; gap: 8px;\n  border-bottom: 2px solid transparent;\n  margin-bottom: -1px;\n}\n.skid-tabs__tab:hover { color: var(--gray-900); }\n.skid-tabs__tab[aria-selected=\"true\"] { color: var(--blue-700); border-bottom-color: var(--blue-600); font-weight: 700; }\n.skid-tabs__tab[disabled] { color: var(--gray-400); cursor: not-allowed; }\n.skid-tabs__tab svg { width: 18px; height: 18px; }\n.skid-tabs__tab .skid-badge { margin-left: 2px; }\n\n/* Contained tabs — boxed segments */\n.skid-tabs--contained { border-bottom: 0; gap: 0; }\n.skid-tabs--contained .skid-tabs__tab {\n  border: 1px solid var(--gray-300);\n  border-right-width: 0;\n  background: var(--gray-50);\n  margin-bottom: 0;\n  padding: 16px;\n  height: 62px; box-sizing: border-box;\n}\n.skid-tabs--contained .skid-tabs__tab:first-child { border-top-left-radius: 4px; border-bottom-left-radius: 4px; }\n.skid-tabs--contained .skid-tabs__tab:last-child  { border-right-width: 1px; border-top-right-radius: 4px; border-bottom-right-radius: 4px; }\n.skid-tabs--contained .skid-tabs__tab[aria-selected=\"true\"] {\n  background: var(--gray-0); color: var(--gray-900); border-color: var(--gray-300); border-bottom-color: var(--blue-600);\n}\n.skid-tabs--contained .skid-tabs__tab[disabled] { background: var(--gray-150); }\n\n/* Vertical tabs */\n.skid-tabs--vertical { flex-direction: column; border-bottom: 0; border-right: 1px solid var(--gray-300); gap: 0; }\n.skid-tabs--vertical .skid-tabs__tab {\n  border-bottom: 0; border-right: 2px solid transparent;\n  margin-bottom: 0; margin-right: -1px;\n  justify-content: flex-start;\n}\n.skid-tabs--vertical .skid-tabs__tab[aria-selected=\"true\"] { border-right-color: var(--blue-600); }\n\n/* ============================================================\n   TEXTAREA (extended)\n   ============================================================ */\n\n.skid-textarea-field { display: flex; flex-direction: column; gap: 8px; width: 100%; }\n.skid-textarea-field__head {\n  display: flex; align-items: center; justify-content: space-between; gap: 8px;\n}\n.skid-textarea-field__label { font: 700 12px/16px var(--font-sans); letter-spacing: .5px; color: var(--gray-800); }\n.skid-textarea-field__count { font: 400 12px/16px var(--font-sans); letter-spacing: .5px; color: var(--gray-500); }\n.skid-textarea-field__shell {\n  border: 1px solid var(--gray-300);\n  border-radius: 4px;\n  background: var(--gray-100);\n  padding: 16px 12px;\n  transition: border-color 120ms, box-shadow 120ms;\n}\n.skid-textarea-field__shell:hover { border-color: var(--gray-600); }\n.skid-textarea-field__shell:focus-within { border-color: var(--blue-400); box-shadow: 0 0 0 1px var(--blue-400); }\n.skid-textarea-field textarea {\n  width: 100%; min-height: 100px; box-sizing: border-box;\n  border: 0; background: transparent; outline: none;\n  resize: vertical;\n  font: 400 14px/20px var(--font-sans); color: var(--gray-800);\n}\n.skid-textarea-field textarea::placeholder { color: var(--gray-600); }\n.skid-textarea-field__helper { font: 400 14px/20px var(--font-sans); color: var(--gray-700); }\n.skid-textarea-field--error .skid-textarea-field__shell { border-color: var(--red-800); }\n.skid-textarea-field--error .skid-textarea-field__count,\n.skid-textarea-field--error .skid-textarea-field__helper { color: var(--red-800); }\n.skid-textarea-field--error .skid-textarea-field__helper { display: flex; align-items: center; gap: 8px; }\n.skid-textarea-field[aria-disabled=\"true\"] .skid-textarea-field__shell { background: transparent; border-color: var(--gray-300); }\n.skid-textarea-field[aria-disabled=\"true\"] .skid-textarea-field__label,\n.skid-textarea-field[aria-disabled=\"true\"] textarea { color: var(--gray-400); }\n.skid-textarea-field[aria-readonly=\"true\"] .skid-textarea-field__shell { background: transparent; }\n\n/* ============================================================\n   TOAST — per Figma\n   Colored backgrounds with near-black text. Each purpose has a\n   distinct fill (blue / green / orange / red) and a 24px alert icon,\n   a regular-weight header, descriptive body, optional inline \"Link\",\n   and a 20×20 white close ×.\n   ============================================================ */\n\n.skid-toast {\n  display: flex; align-items: center; gap: 12px;\n  background: var(--blue-600);\n  color: #fff;\n  border-radius: 8px;\n  padding: 12px;\n  box-shadow: 0 4px 4px 0 rgba(0,0,0,0.25);\n  width: 500px; max-width: 100%;\n  font-family: var(--font-sans);\n  box-sizing: border-box;\n  border: 1px solid transparent;\n}\n.skid-toast__icon { width: 24px; height: 24px; flex-shrink: 0; color: #fff; align-self: flex-start; }\n.skid-toast__body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }\n.skid-toast__title { font: 700 16px/22px var(--font-sans); color: #fff; }\n.skid-toast__text  { font: 400 14px/19px var(--font-sans); color: #fff; }\n.skid-toast__link {\n  font: 400 14px/19px var(--font-sans);\n  color: #fff;\n  text-decoration: none;\n  padding: 0 12px;\n  white-space: nowrap;\n  flex-shrink: 0;\n}\n.skid-toast__close {\n  width: 20px; height: 20px; border: 0; background: transparent;\n  display: grid; place-items: center;\n  color: #fff; cursor: pointer; border-radius: 4px;\n  flex-shrink: 0;\n}\n.skid-toast__close svg { width: 20px; height: 20px; }\n.skid-toast__close:hover { background: rgba(255,255,255,0.15); }\n\n.skid-toast--info    { background: var(--blue-600);   border-color: var(--blue-600); }\n.skid-toast--success { background: var(--green-800);  border-color: var(--green-800); }\n.skid-toast--warning { background: var(--orange-700); border-color: var(--orange-700); }\n.skid-toast--error   { background: var(--red-800);    border-color: var(--red-800); }\n\n.skid-toast__container {\n  position: fixed; top: 24px; right: 24px; z-index: 1000;\n  display: flex; flex-direction: column; gap: 12px;\n}\n\n/* ============================================================\n   TOOLTIP (extended with directional arrows)\n   ============================================================ */\n\n.skid-tooltip {\n  display: inline-block;\n  background: var(--gray-900);\n  color: var(--gray-0);\n  font: 400 12px/16px var(--font-sans);\n  padding: 6px 10px;\n  border-radius: 4px;\n  box-shadow: var(--elev-3);\n  position: relative;\n  max-width: 240px;\n  text-align: center;\n}\n.skid-tooltip--lg { font-size: 14px; line-height: 19px; padding: 10px 14px; }\n.skid-tooltip::after {\n  content: \"\"; position: absolute;\n  width: 8px; height: 8px;\n  background: var(--gray-900);\n  transform: rotate(45deg);\n}\n.skid-tooltip--top::after    { bottom: -4px; left: 50%; margin-left: -4px; }\n.skid-tooltip--bottom::after { top: -4px; left: 50%; margin-left: -4px; }\n.skid-tooltip--left::after   { right: -4px; top: 50%; margin-top: -4px; }\n.skid-tooltip--right::after  { left: -4px; top: 50%; margin-top: -4px; }\n\n/* ============================================================\n   TILE — selectable card with radio or checkbox\n   ============================================================ */\n\n.skid-tile {\n  display: grid; grid-template-columns: 20px 1fr;\n  gap: 12px; padding: 16px;\n  border-radius: 8px;\n  background: var(--gray-100);\n  border: 1px solid var(--gray-300);\n  cursor: pointer;\n  transition: border-color 120ms, background 120ms;\n  position: relative;\n  min-height: 180px;\n  font-family: var(--font-sans);\n}\n.skid-tile:hover { border-color: var(--blue-700); }\n.skid-tile[aria-selected=\"true\"] {\n  border-color: var(--blue-600);\n  background: var(--gray-100);\n}\n.skid-tile[aria-disabled=\"true\"] { background: var(--gray-50); border-color: var(--gray-200); cursor: not-allowed; }\n.skid-tile[aria-disabled=\"true\"] * { color: var(--gray-400) !important; }\n.skid-tile__indicator {\n  width: 20px; height: 20px;\n  position: relative;\n}\n.skid-tile__title { font: 700 14px/20px var(--font-sans); color: var(--gray-900); margin-bottom: 4px; }\n.skid-tile__body  { font: 400 13px/18px var(--font-sans); color: var(--gray-700); }\n\n/* compact horizontal tile */\n.skid-tile--compact { min-height: auto; padding: 12px; }\n\n/* ============================================================\n   TIMELINE\n   ============================================================ */\n\n.skid-timeline {\n  display: flex; flex-direction: column;\n  font-family: var(--font-sans);\n}\n.skid-timeline__item {\n  display: grid; grid-template-columns: 84px 24px 1fr auto;\n  gap: 12px;\n  padding-bottom: 32px;\n  align-items: start;\n}\n.skid-timeline__item:last-child { padding-bottom: 0; }\n\n.skid-timeline__time {\n  font: 700 12px/16px var(--font-sans);\n  color: var(--gray-500);\n  text-align: right;\n  padding-top: 0;\n  white-space: pre-line;\n}\n\n.skid-timeline__rail {\n  display: flex; flex-direction: column; align-items: center;\n  position: relative;\n  align-self: stretch;\n}\n.skid-timeline__node {\n  width: 12px; height: 12px; border-radius: 50%;\n  background: var(--gray-300); border: 2px solid var(--gray-0);\n  flex-shrink: 0;\n  box-shadow: 0 0 0 1px var(--gray-300);\n  margin-top: 4px;\n  z-index: 1;\n}\n.skid-timeline__line {\n  width: 2px; flex: 1; min-height: 28px;\n  background: var(--gray-300);\n  margin-top: -2px;\n}\n.skid-timeline__item:last-child .skid-timeline__line { display: none; }\n\n.skid-timeline__item--completed .skid-timeline__node {\n  background: var(--green-800); box-shadow: 0 0 0 1px var(--green-800);\n}\n.skid-timeline__item--completed .skid-timeline__line { background: var(--green-800); }\n.skid-timeline__item--active .skid-timeline__node {\n  background: var(--blue-600); box-shadow: 0 0 0 1px var(--blue-600), 0 0 0 5px rgba(0,131,187,0.18);\n}\n\n.skid-timeline__content { display: flex; flex-direction: column; gap: 6px; padding-top: 0; }\n.skid-timeline__header { display: flex; align-items: center; gap: 12px; }\n.skid-timeline__title  { font: 700 16px/20px var(--font-sans); color: var(--gray-800); }\n.skid-timeline__desc   { font: 400 14px/19px var(--font-sans); color: var(--gray-700); }\n\n.skid-timeline__chev {\n  width: 20px; height: 20px; border: 0; background: transparent;\n  display: grid; place-items: center; color: var(--gray-600); cursor: pointer;\n  border-radius: 4px; align-self: start;\n  margin-top: 2px;\n}\n.skid-timeline__chev:hover { background: var(--gray-100); color: var(--gray-900); }\n.skid-timeline__chev[aria-expanded=\"false\"] svg { transform: rotate(180deg); }\n\n/* mobile-stacked variant */\n.skid-timeline--mobile .skid-timeline__item {\n  grid-template-columns: 24px 1fr auto;\n}\n.skid-timeline--mobile .skid-timeline__time {\n  grid-column: 2 / 3;\n  text-align: left;\n  margin-bottom: 4px;\n}\n.skid-timeline--mobile .skid-timeline__rail { grid-row: 1 / 4; }\n.skid-timeline--mobile .skid-timeline__content { grid-column: 2 / 3; }\n.skid-timeline--mobile .skid-timeline__chev { grid-column: 3 / 4; grid-row: 1; }\n\n<\u002Fstyle>\n  <style>\n    *{ box-sizing: border-box; }\n    body{ margin:0; }\n    @keyframes nudge-blink{ 0%,50%{opacity:1} 50.01%,100%{opacity:0} }\n\n    [data-key]:active, [data-action]:active{ filter: brightness(0.9); }\n    .nudge-scroll::-webkit-scrollbar{ width:0; height:0; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh; width:100%; background:var(--gray-100); display:flex; align-items:flex-start; justify-content:center; gap:40px; padding:40px; font-family:var(--font-sans);\">\n\n  <!-- ===================== PHONE ===================== -->\n  <div style=\"flex:0 0 auto;\">\n    <div style=\"position:sticky; top:40px;\">\n      <div style=\"width:410px; height:864px; background:#0a0a0a; border-radius:54px; padding:10px; box-shadow:0 40px 90px rgba(0,31,51,0.28), 0 0 0 2px rgba(0,0,0,0.4);\">\n        <div style=\"position:relative; width:390px; height:844px; border-radius:44px; overflow:hidden; background:var(--gray-50); display:flex; flex-direction:column;\">\n\n          <!-- notch -->\n          <div style=\"position:absolute; top:0; left:50%; transform:translateX(-50%); width:150px; height:30px; background:#0a0a0a; border-radius:0 0 18px 18px; z-index:80;\"><\u002Fdiv>\n\n          <!-- ================= COMPOSER SCREEN ================= -->\n          <sc-if value=\"{{ showComposer }}\" hint-placeholder-val=\"{{ true }}\">\n          < border-radius:6px;box-shadow:0 1px 0 rgba(0,0,0,.28);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;\"><span style=\"font:400 24px/1 -apple-system,system-ui;color:#111;\">9<\u002Fspan><span style=\"font:700 9px/1 -apple-system,system-ui;color:#555;letter-spacing:1px;margin-top:2px;\">WXYZ<\u002Fspan><\u002Fdiv>\n                <div data-key=\".\" style=\"height:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;\"><span style=\"font:400 26px/1 -apple-system,system-ui;color:#111;\">.<\u002Fspan><\u002Fdiv>\n                <div data-key=\"0\" style=\"height:46px;background:#fff;border-radius:6px;box-shadow:0 1px 0 rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;\"><span style=\"font:400 24px/1 -apple-system,system-ui;color:#111;\">0<\u002Fspan><\u002Fdiv>\n                <div data-action=\"del\" style=\"height:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;\"><svg width=\"26\" height=\"20\" viewBox=\"0 0 24 18\" fill=\"none\" stroke=\"#1a1a1a\" stroke-width=\"1.7\" stroke-linejoin=\"round\"><path d=\"M7 2h14a1 1 0 011 1v12a1 1 0 01-1 1H7l-6-7 6-7z\"><\u002Fpath><path d=\"M11 6l6 6M17 6l-6 6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- home indicator -->\n          <div style=\"position:absolute; bottom:0; left:0; right:0; z-index:90; height:24px; display:flex; align-items:flex-end; justify-content:center; padding-bottom:7px; pointer-events:none;\">\n            <div style=\"width:130px; height:5px; border-radius:100px; background:rgba(0,0,0,.32);\"><\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===================== SIDE PANEL ===================== -->\n  <sc-if value=\"{{ showDevPanel }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"flex:0 0 340px; position:sticky; top:40px; display:flex; flex-direction:column; gap:16px;\">\n    <div class=\"skid-card skid-card--shadow\">\n      <div style=\"padding:16px 18px; border-bottom:1px solid var(--gray-200); display:flex; align-items:center; gap:10px;\">\n        <div style=\"flex:1;\">\n          <div style=\"font-weight:700; font-size:15px; color:var(--gray-900);\">Quote nudge — demo<\u002Fdiv>\n          <div style=\"font-size:12px; color:var(--gray-500);\">Q&amp;A quote interception<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ onHideDev }}\" class=\"skid-btn skid-btn--ghost skid-btn--sm\" style=\"padding:0 10px;\">Hide<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"padding:18px; display:flex; flex-direction:column; gap:16px;\">\n        <div style=\"font-size:14px; line-height:20px; color:var(--gray-700);\">The carrier typed a price in the Q&amp;A. On <strong>Send<\u002Fstrong>, a drawer offers to turn it into a real quote — sending the interaction in two directions:<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:10px; align-items:flex-start;\">\n            <div style=\"width:24px; height:24px; border-radius:50%; background:var(--blue-600); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex:0 0 auto;\">1<\u002Fdiv>\n            <div style=\"font-size:14px; line-height:19px; color:var(--gray-800);\"><strong>Place Quote<\u002Fstrong> → opens the Submit Quote form, prefilled and editable.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:10px; align-items:flex-start;\">\n            <div style=\"width:24px; height:24px; border-radius:50%; background:var(--blue-600); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex:0 0 auto;\">2<\u002Fdiv>\n            <div style=\"font-size:14px; line-height:19px; color:var(--gray-800);\"><strong>Send as Message<\u002Fstrong> → posts the message to the Q&amp;A as usual.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"skid-divider\"><\u002Fdiv>\n        <button onclick=\"{{ onReplay }}\" class=\"skid-btn skid-btn--secondary\" style=\"width:100%;\">Replay the Drawer<\u002Fbutton>\n        <button onclick=\"{{ onReset }}\" class=\"skid-btn skid-btn--tertiary skid-btn--sm\" style=\"width:100%;\">Reset Demo<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size:12px; line-height:17px; color:var(--gray-500); padding:0 4px;\">Tip — on the Submit Quote form, edit the amount with the keypad. \"Amount you receive\", the service provider fee, and price per mile recalculate live.<\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ devHiddenShow }}\" hint-placeholder-val=\"{{ false }}\">\n    <button onclick=\"{{ onShowDev }}\" class=\"skid-btn skid-btn--secondary skid-btn--sm\" style=\"position:fixed; right:24px; bottom:24px; z-index:200; box-shadow:var(--elev-3);\">Demo<\u002Fbutton>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;showDevPanel&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  MIN = 20;\n  MAX = 100000;\n  MILES = 1000;\n\n  state = {\n    screen: 'composer',\n    draft: 'I can take this for $1,250',\n    sheetOpen: false,\n    detected: null,\n    thread: [],\n    quoteAmount: '',\n    kbLayer: 'letters',\n    shiftOn: false,\n    toast: null,\n    expiration: '24h',\n    devHidden: false,\n  };\n\n  fmtUSD(n) {\n    if (n == null || isNaN(n)) return '$--';\n    const r = Math.round(n * 100) / 100;\n    if (Number.isInteger(r)) return '$' + r.toLocaleString('en-US');\n    return '$' + r.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });\n  }\n\n  detect(text) {\n    text = text || '';\n    let signal = null, raw = null;\n    let m = text.match(/\\$\\s?(\\d{1,3}(?:,\\d{3})+|\\d+)(?:\\.(\\d{1,2}))?/);\n    if (m) { signal = 'symbol'; raw = m[1].replace(/,/g, '') + (m[2] ? '.' + m[2] : ''); }\n    else {\n      let w = text.match(/(\\d{1,3}(?:,\\d{3})+|\\d+)(?:\\.(\\d{1,2}))?\\s?(?:dollars?|bucks?)\\b/i);\n      if (w) { signal = 'word'; raw = w[1].replace(/,/g, '') + (w[2] ? '.' + w[2] : ''); }\n    }\n    if (signal === null) return { found: false, amount: null, inRange: false, signal: null };\n    const amount = parseFloat(raw);\n    const inRange = amount >= this.MIN && amount <= this.MAX;\n    return { found: true, amount, inRange, signal };\n  }\n\n  slideSheetUp(tries) {\n    tries = tries || 0;\n    const el = document.querySelector('.nudge-sheet');\n    const scrim = document.querySelector('.nudge-scrim');\n    if (!el) {\n      if (tries < 15) requestAnimationFrame(() => this.slideSheetUp(tries + 1));\n      return;\n    }\n    // Manual rAF tween (own clock) — robust even when the CSS/WAA timeline is\n    // paused (e.g. unfocused tab); resting state is the natural translateY(0).\n    const dist = el.offsetHeight || 380;\n    const dur = 340;\n    const ease = (t) => 1 - Math.pow(1 - t, 3); // easeOutCubic\n    const start = (typeof performance !== 'undefined' ? performance.now() : Date.now());\n    el.style.transform = 'translateY(' + dist + 'px)';\n    if (scrim) scrim.style.opacity = '0';\n    const step = (now) => {\n      const p = Math.min(1, (now - start) / dur);\n      const e = ease(p);\n      el.style.transform = 'translateY(' + (dist * (1 - e)) + 'px)';\n      if (scrim) scrim.style.opacity = String(e);\n      if (p < 1) requestAnimationFrame(step);\n      else { el.style.transform = ''; if (scrim) scrim.style.opacity = ''; }\n    };\n    requestAnimationFrame(step);\n    // safety: guarantee final resting state even if rAF is interrupted\n    setTimeout(() => { el.style.transform = ''; if (scrim) scrim.style.opacity = ''; }, dur + 120);\n  }\n\n  openSheet(detected) {\n    this.setState({ detected, sheetOpen: true });\n    requestAnimationFrame(() => this.slideSheetUp());\n  }\n\n  showToast(text) {\n    if (this._t) clearTimeout(this._t);\n    this.setState({ toast: text });\n    this._t = setTimeout(() => this.setState({ toast: null }), 2200);\n  }\n\n  postMessage() {\n    const text = this.state.draft.trim();\n    if (!text) return;\n    const d = new Date();\n    let h = d.getHours(), ampm = h >= 12 ? 'pm' : 'am';\n    h = h % 12; if (h === 0) h = 12;\n    const time = h + ':' + String(d.getMinutes()).padStart(2, '0') + ampm;\n    this.setState(s => ({\n      thread: [...s.thread, { id: Date.now(), text, author: 'You', initials: 'YO', time }],\n      draft: '',\n      sheetOpen: false,\n    }));\n    this.showToast('Message sent to Q&A');\n  }\n\n  onSend = () => {\n    const d = this.detect(this.state.draft);\n    if (d.found && d.inRange) this.openSheet(d);\n    else this.postMessage();\n  };\n\n  onPlaceBid = () => {\n    const amt = this.state.detected ? this.state.detected.amount : 0;\n    this.setState({ screen: 'placeQuote', quoteAmount: String(amt), sheetOpen: false });\n  };\n  onSendAsMessage = () => { this.postMessage(); };\n  onDismissSheet = () => { this.setState({ sheetOpen: false }); };\n  onBackFromQuote = () => { this.setState({ screen: 'composer' }); };\n\n  onKey = (e) => {\n    const el = e.target.closest('[data-key],[data-action]');\n    if (!el) return;\n    const act = el.getAttribute('data-action');\n    if (act) {\n      if (act === 'shift') this.setState(s => ({ shiftOn: !s.shiftOn }));\n      else if (act === 'del') this.setState(s => ({ draft: s.draft.slice(0, -1) }));\n      else if (act === 'space') this.setState(s => ({ draft: s.draft + ' ' }));\n      else if (act === 'toNumbers') this.setState({ kbLayer: 'numbers' });\n      else if (act === 'toLetters') this.setState({ kbLayer: 'letters' });\n      return;\n    }\n    let ch = el.getAttribute('data-key');\n    if (ch == null) return;\n    if (/^[a-z]$/.test(ch)) {\n      const up = this.state.shiftOn;\n      this.setState(s => ({ draft: s.draft + (up ? ch.toUpperCase() : ch), shiftOn: false }));\n    } else {\n      this.setState(s => ({ draft: s.draft + ch }));\n    }\n  };\n\n  onNumKey = (e) => {\n    const el = e.target.closest('[data-key],[data-action]');\n    if (!el) return;\n    if (el.getAttribute('data-action') === 'del') {\n      this.setState(s => ({ quoteAmount: s.quoteAmount.slice(0, -1) }));\n      return;\n    }\n    const ch = el.getAttribute('data-key');\n    if (ch == null) return;\n    this.setState(s => {\n      let q = s.quoteAmount;\n      if (ch === '.') {\n        if (q.includes('.')) return null;\n        if (q === '') q = '0';\n        return { quoteAmount: q + '.' };\n      }\n      if (q.includes('.') && q.split('.')[1].length >= 2) return null;\n      if (q.replace('.', '').length >= 9) return null;\n      if (q === '0') q = '';\n      return { quoteAmount: q + ch };\n    });\n  };\n\n  setPreset(text) { this.setState({ draft: text, sheetOpen: false }); }\n  onPreset = () => this.setPreset('I can take this for $1,250');\n  onReplay = () => {\n    const text = 'I can take this for $1,250';\n    const d = this.detect(text);\n    this.setState({ screen: 'composer', draft: text, sheetOpen: false });\n    requestAnimationFrame(() => this.openSheet(d));\n  };\n  onSubmitQuote = () => { this.setState({ screen: 'composer' }); this.showToast('Quote submitted'); };\n  onExp24 = () => this.setState({ expiration: '24h' });\n  onExpSpecific = () => this.setState({ expiration: 'specific' });\n  onHideDev = () => this.setState({ devHidden: true });\n  onShowDev = () => this.setState({ devHidden: false });\n  onReset = () => this.setState({ screen: 'composer', draft: 'I can take this for $1,250', thread: [], sheetOpen: false, quoteAmount: '', kbLayer: 'letters', toast: null, expiration: '24h' });\n\n  renderVals() {\n    const s = this.state;\n    const amt = s.detected ? s.detected.amount : 0;\n    const T = parseFloat(s.quoteAmount);\n    const Tn = isFinite(T) ? T : 0;\n    const fee = Tn * 0.10;\n    const receive = Tn - fee;\n    const perMile = Tn / this.MILES;\n\n    const showDevPanel = ((this.props && this.props.showDevPanel !== undefined) ? this.props.showDevPanel : true) && !s.devHidden;\n\n    return {\n      // screens\n      showComposer: s.screen === 'composer',\n      showPlaceQuote: s.screen === 'placeQuote',\n      statusTime: '10:54',\n      surfaceTitle: 'Listing Q & A: 2018 Jeep Wrangler',\n\n      // composer\n      draft: s.draft,\n      draftEmpty: s.draft.length === 0,\n      draftHasText: s.draft.length > 0,\n      sendDisabled: s.draft.trim().length === 0,\n      onSend: this.onSend,\n      threadItems: s.thread,\n      threadEmpty: s.thread.length === 0,\n\n      // keyboard\n      onKey: this.onKey,\n      kbLetters: s.kbLayer === 'letters',\n      kbNumbers: s.kbLayer === 'numbers',\n\n      // toast\n      toastShow: !!s.toast,\n      toastText: s.toast || '',\n\n      // drawer\n      sheetOpen: s.sheetOpen,\n      amountFmt: this.fmtUSD(amt),\n      placeBidLabel: 'Place ' + this.fmtUSD(amt) + ' Quote',\n      routeFrom: 'Long City Name, TX',\n      routeTo: 'Long City Name, TX',\n      onPlaceBid: this.onPlaceBid,\n      onSendAsMessage: this.onSendAsMessage,\n      onDismissSheet: this.onDismissSheet,\n\n      // submit quote form\n      onNumKey: this.onNumKey,\n      onBackFromQuote: this.onBackFromQuote,\n      onSubmitQuote: this.onSubmitQuote,\n      quoteDisplay: s.quoteAmount === '' ? '0' : s.quoteAmount,\n      amountFieldBorder: s.quoteAmount !== '' && Tn > 0 ? 'var(--blue-500)' : 'var(--gray-300)',\n      receiveFmt: Tn > 0 ? this.fmtUSD(receive) : '$0.00',\n      feeFmt: Tn > 0 ? this.fmtUSD(fee) : '$0.00',\n      perMileFmt: Tn > 0 ? '$' + perMile.toFixed(2) : '$0.00',\n      exp24: s.expiration === '24h',\n      expSpecific: s.expiration === 'specific',\n      onExp24: this.onExp24,\n      onExpSpecific: this.onExpSpecific,\n\n      // side panel\n      showDevPanel,\n      devHiddenShow: !showDevPanel,\n      onHideDev: this.onHideDev,\n      onShowDev: this.onShowDev,\n      onReset: this.onReset,\n      onReplay: this.onReplay,\n      onPreset: this.onPreset,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
